{id:'a1_to_be', level:'A1', icon:'🔵', title:'To Be: am / is / are',
explain:`
<div class="explain-block">
  <div class="block-label">The Basics</div>
  The verb <em>to be</em> is the most important verb in English. It changes its form depending on who the subject is. In German you also change <em>sein</em>: ich bin, du bist, er ist — English works the same way, just with different forms.
  <div class="formula">I am · You are · He / She / It is · We are · They are</div>
  Short forms (contractions) are very common in spoken English:<br>
  <em>I'm · You're · He's / She's / It's · We're · They're</em>
</div>
<div class="explain-block">
  <div class="block-label">Affirmative examples</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">I <em>am</em> a tax advisor. &nbsp;(I'm a tax advisor.)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">She <em>is</em> from Berlin. &nbsp;(She's from Berlin.)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">They <em>are</em> colleagues.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">The report <em>is</em> ready.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Negative & Questions</div>
  To make a negative, add <em>not</em> after to be: <em>is not → isn't, are not → aren't</em>.<br>
  To ask a question, simply move to be before the subject.
  <div class="formula">Negative: I am not / She isn't / They aren't<br>Question: Is she ready? / Are they here? / Am I late?</div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">Is the meeting at 10? — Yes, it is. / No, it isn't.</span></div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">Are you the new manager? — Yes, I am.</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  "I am" = "Ich bin", "He is" = "Er ist", "They are" = "Sie sind". The logic is the same as German — the verb agrees with the subject. Unlike German, English has no gender for nouns, so all singular things use <em>it is</em>.
</div>`,
quiz:[
  {q:"_____ she a doctor?",opts:["Am","Is","Are","Be"],ans:1,fb:'"She" is third-person singular → "Is". The pattern: I am, you/we/they are, he/she/it is.'},
  {q:"They _____ from Italy.",opts:["is","am","are","be"],ans:2,fb:'"They" is plural → "are". Full sentence: "They are from Italy." Short form: "They\'re from Italy."'},
  {q:"I _____ not happy today.",opts:["is","are","be","am"],ans:3,fb:'"I" always goes with "am". Negative: "I am not" or "I\'m not" — never "I\'m no" (German false friend!).'},
  {q:"My name _____ George.",opts:["are","am","is","be"],ans:2,fb:'"My name" = singular "it" → "is". Think: "It is George." → "My name is George."'},
  {q:"_____ you from Frankfurt?",opts:["Is","Am","Be","Are"],ans:3,fb:'Questions with "you" → "Are you...?" Note: the verb moves to the front — no question word needed if it\'s a yes/no question.'},
  {q:"We _____ not in the office today.",opts:["is","am","be","are"],ans:3,fb:'"We" → "are". Negative: "We are not" or "We aren\'t" in the office.'},
  {q:"He _____ the new team leader.",opts:["am","are","be","is"],ans:3,fb:'"He" → "is". This is a permanent-state sentence — use to be, not do/have.'},
  {q:"What _____ your name?",opts:["am","are","is","be"],ans:2,fb:'"What is your name?" — "What" = singular question, so "is". Short form in speech: "What\'s your name?"'},
]},

{id:'a1_present_simple', level:'A1', icon:'⏰', title:'Present Simple',
explain:`
<div class="explain-block">
  <div class="block-label">When to use it</div>
  Present Simple describes things that are <em>always true, habitual, or regular</em>. It is not about what is happening right now — that is Present Continuous. Think of Present Simple as a statement of fact or routine.
  <div class="formula">I / You / We / They + verb (base form)<br>He / She / It + verb + s</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">I <em>work</em> in Frankfurt. (permanent job)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">She <em>works</em> every Monday.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Water <em>boils</em> at 100°C. (scientific fact)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Spelling rules for he/she/it</div>
  Most verbs: add <em>-s</em> → works, plays, reads.<br>
  Verbs ending in -ch, -sh, -x, -o, -s: add <em>-es</em> → watches, goes, fixes.<br>
  Verbs ending in consonant + y: drop y, add <em>-ies</em> → study → studies.
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">He studies law. / She watches the news. / He goes to the gym.</span></div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">She studys / She go / He watchs</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Negatives & Questions</div>
  Use <em>do/does</em> as helpers. "Does" is only for he/she/it — the main verb stays in base form!
  <div class="formula">Negative: I don't / He doesn't + base verb<br>Question: Do you / Does she + base verb?</div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">Does she work here? — Yes, she does.</span></div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">Does she works here? (double -s error!)</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  German uses the same tense ("Er arbeitet") for both "he works" and "he is working". English splits these into two separate tenses. Use Present Simple for habits and facts. Use Present Continuous for what is happening right now.
</div>`,
quiz:[
  {q:"She _____ (work) every day.",opts:["work","working","works","is work"],ans:2,fb:'He/she/it → add -s: "works". This is a habit (every day) → Present Simple, not Continuous.'},
  {q:"_____ they speak German?",opts:["Does","Is","Do","Are"],ans:2,fb:'"They" is plural → "Do they speak?" "Does" is only for he/she/it.'},
  {q:"He _____ not eat meat.",opts:["don't","isn't","not","doesn't"],ans:3,fb:'He/she/it negative → "doesn\'t" + base verb. Never "don\'t" for he/she/it.'},
  {q:"Water _____ at 100°C.",opts:["boiling","is boiling","boil","boils"],ans:3,fb:'Scientific fact → Present Simple. It/water → "boils" (add -s).'},
  {q:"_____ she like coffee?",opts:["Do","Is","Are","Does"],ans:3,fb:'"She" → "Does she like?" The main verb stays as "like" (no -s after does).'},
  {q:"I _____ not understand this.",opts:["doesn't","don't","not","am not"],ans:1,fb:'"I" → "don\'t" + base verb. "Don\'t understand" — "understand" is a state verb, always in simple form.'},
  {q:"My brother _____ tennis on weekends.",opts:["play","playing","playes","plays"],ans:3,fb:'He (brother) → "plays". Note: not "playes" — verbs ending in a consonant just add -s.'},
  {q:"The bank _____ at 8 AM.",opts:["open","opening","opens","is open"],ans:2,fb:'Regular timetable fact → Present Simple. It (bank) → "opens" (ends in -s, so just add -s → opens).'},
]},

{id:'a1_articles', level:'A1', icon:'📰', title:'Articles: a / an / the',
explain:`
<div class="explain-block">
  <div class="block-label">a and an — Indefinite articles</div>
  Use <em>a</em> or <em>an</em> when you mention something for the first time, or when the listener doesn't know which specific one you mean. They only go before <em>singular countable nouns</em>.
  <div class="formula">a + consonant sound: a book · a tax report · a university<br>an + vowel sound: an apple · an hour · an MBA</div>
  The rule is about the <em>sound</em>, not the spelling!<br>
  <em>a university</em> — starts with "yoo" sound (consonant sound)<br>
  <em>an hour</em> — starts with "ow" sound (vowel sound, silent h)
</div>
<div class="explain-block">
  <div class="block-label">the — Definite article</div>
  Use <em>the</em> when both you and the listener know exactly which one you mean. This happens when: (1) you already mentioned it, (2) there is only one of it, or (3) it is clear from context.
  <div class="ex-row"><span class="ex-tag">1st</span><span class="ex-neutral">I found <em>a</em> solution. (first mention)</span></div>
  <div class="ex-row"><span class="ex-tag">2nd</span><span class="ex-neutral"><em>The</em> solution worked perfectly. (already mentioned)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>The</em> sun · the internet · the ECB · the Bundesbank (only one exists)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">No article (zero article)</div>
  Use no article before: uncountable nouns in general, plural nouns in general, proper names, languages, meals, and institutions used in their general function.
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">I drink <em>—</em> coffee every morning. (uncountable, general)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>—</em> Funds are regulated by BaFin. (plural, general)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">She studied at <em>—</em> university. (institution, general use)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">I speak <em>—</em> German and <em>—</em> English. (languages)</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  German also has definite (der/die/das) and indefinite (ein/eine) articles, but German articles also change by case (nominative, accusative etc.). English articles never change — "the" is always "the". The concept is the same, just simpler.
</div>
<div class="warn-box">
  <div class="warn-label">⚠ Common mistakes</div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">She works at an European Central Bank.</span></div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">She works at the European Central Bank. (unique + starts with /j/ sound → "the", not "an")</span></div>
</div>`,
quiz:[
  {q:"She works at _____ European Central Bank.",opts:["a","an","the","—"],ans:2,fb:'"The ECB" — unique institution, only one exists → "the". Also: "European" starts with /j/ sound, so "a European" not "an European".'},
  {q:"I need _____ hour to finish this.",opts:["a","an","the","—"],ans:1,fb:'"Hour" begins with a vowel sound /aʊ/ — the H is silent → "an hour".'},
  {q:"He has _____ experience in fund taxation.",opts:["—","a","an","the"],ans:0,fb:'"Experience" is uncountable in general use → no article. Exception: "He had a remarkable experience" (a specific single event).'},
  {q:"I saw _____ film last night. _____ film was excellent.",opts:["a / The","the / A","a / A","the / The"],ans:0,fb:'First mention → "a film" (indefinite). Second mention → "The film" (now both speaker and listener know which one).'},
  {q:"She is _____ honest person.",opts:["a","an","the","—"],ans:1,fb:'"Honest" starts with a vowel sound /ɒ/ (silent H) → "an honest person".'},
  {q:"I love _____ coffee.",opts:["the","a","an","—"],ans:3,fb:'Uncountable noun (coffee) in general → no article. "I love coffee" = coffee in general. "I love the coffee here" would mean this specific coffee.'},
  {q:"_____ Amazon is _____ longest river in South America.",opts:["The / the","A / the","The / a","— / the"],ans:0,fb:'Named geographical features take "the" (the Amazon, the Rhine). Superlatives always need "the longest".'},
  {q:"She went to _____ prison for two years.",opts:["the","a","—","an"],ans:2,fb:'"Prison" used as an institution (= she was imprisoned) → no article. Compare: "The police visited the prison" (specific building) → needs "the".'},
]},

// ─── A2 ────────────────────────────────────────────
{id:'a2_past_simple', level:'A2', icon:'⏪', title:'Past Simple',
explain:`
<div class="explain-block">
  <div class="block-label">When to use it</div>
  Past Simple is for <em>completed actions at a specific time in the past</em>. The action is finished — it has no connection to the present. Signal words: <em>yesterday, last week, in 2020, ago, when, at 8 PM</em>.
  <div class="formula">Regular verbs: verb + ed (worked, played, visited)<br>Irregular verbs: must be memorised (go→went, see→saw, buy→bought)</div>
</div>
<div class="explain-block">
  <div class="block-label">Regular verb spelling rules</div>
  Most verbs: just add <em>-ed</em> → worked, played.<br>
  Verbs ending in -e: just add <em>-d</em> → liked, decided.<br>
  Verbs ending in consonant + y: change y → <em>-ied</em> → studied, tried.<br>
  Short verbs (CVC): double the final consonant + <em>-ed</em> → stopped, planned.
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">She planned the meeting. / They studied hard. / He stopped smoking.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Common irregular verbs</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">go → went · have → had · see → saw · come → came</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">take → took · make → made · buy → bought · think → thought</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">know → knew · write → wrote · speak → spoke · give → gave</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Negatives & Questions</div>
  Use <em>did</em> as a helper. After did/didn't, the main verb goes back to base form!
  <div class="formula">Negative: Subject + didn't + base verb<br>Question: Did + subject + base verb?</div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">Did she go to the meeting? — Yes, she did. / No, she didn't.</span></div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">Did she went to the meeting? (wrong — base verb after did!)</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  Past Simple = Präteritum (ich arbeitete, er ging). In spoken German, Perfekt is often preferred. In English, when there's a specific past time (yesterday, in 2020), you must use Past Simple — Present Perfect would be wrong. "I have visited London in 2019" ✗ → "I visited London in 2019" ✓.
</div>`,
quiz:[
  {q:"She _____ to Berlin last week.",opts:["goes","went","gone","goed"],ans:1,fb:'"Go" is irregular: go → went. "Last week" = specific past time → Past Simple. "Goed" doesn\'t exist.'},
  {q:"_____ you call him yesterday?",opts:["Did / called","Did / call","Does / call","Do / called"],ans:1,fb:'Past Simple question: Did + subject + base verb. "Call" stays as base form after "did" — never "called".'},
  {q:"They _____ the film.",opts:["didn't saw","don't see","didn't see","not saw"],ans:2,fb:'Past Simple negative: didn\'t + base verb. "Didn\'t see" — never "didn\'t saw" (the -ed/-irregular form only goes without the helper).'},
  {q:"I _____ a new car two years ago.",opts:["buyed","buy","buyed","bought"],ans:3,fb:'"Buy" is irregular: buy → bought. "Two years ago" = specific past → Past Simple.'},
  {q:"When _____ she arrive?",opts:["did she arrived","she arrived","did she arrive","has she arrived"],ans:2,fb:'Past question with "when": Did + subject + base verb. "When did she arrive?" — never "did she arrived".'},
  {q:"He _____ here for five years, then left.",opts:["has worked","worked","works","was working"],ans:1,fb:'Finished period (he left, so it\'s over) → Past Simple. If he still works there, use Present Perfect: "has worked".'},
  {q:"We _____ a great time at the conference.",opts:["had","have","haved","has"],ans:0,fb:'"Have" is irregular: have → had. Same form for all persons in Past Simple: I/you/he/we/they all use "had".'},
  {q:"The meeting _____ at 9 and _____ at 11.",opts:["started / ended","started / end","start / ended","starts / ended"],ans:0,fb:'Two completed past actions in sequence → both Past Simple. Regular verbs: just add -ed.'},
]},

{id:'a2_prepositions_time', level:'A2', icon:'📅', title:'Prepositions of Time & Place',
explain:`
<div class="explain-block">
  <div class="block-label">Time: at / on / in</div>
  These three cover almost all time expressions. The rule is about how specific or large the time unit is.
  <div class="formula">at → precise time: at 9 AM · at noon · at midnight · at Christmas<br>on → days and dates: on Monday · on 15 April · on my birthday<br>in → longer periods: in April · in 2024 · in the morning · in summer · in the 20th century</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">The meeting is <em>at</em> 3 PM <em>on</em> Tuesday <em>in</em> March.</span></div>
  <div class="ex-row"><span class="ex-tag">💡</span><span class="ex-neutral">Special: <em>at</em> night (not "in the night" in standard English)</span></div>
  <div class="ex-row"><span class="ex-tag">💡</span><span class="ex-neutral">No preposition before: this, last, next, every → <em>—</em> last week, <em>—</em> next Monday</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Place: at / on / in</div>
  <div class="ex-row"><span class="ex-tag">at</span><span class="ex-neutral">Specific point/location: at the office · at the station · at home · at work</span></div>
  <div class="ex-row"><span class="ex-tag">in</span><span class="ex-neutral">Enclosed space or area: in Frankfurt · in Germany · in the room · in the car</span></div>
  <div class="ex-row"><span class="ex-tag">on</span><span class="ex-neutral">Surface or line: on the table · on the first floor · on the left · on the bus/train</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Other key prepositions</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>next to / beside</em> — The café is next to the bank.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>between</em> — The office is between the station and the park.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>opposite</em> — The hotel is opposite the train station. (facing it)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>above / below / under / over</em> — The sign is above the door.</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  German "am Montag" = "on Monday". German "im April" = "in April". German "um 9 Uhr" = "at 9 o'clock". The logic is very similar, but English never changes the preposition by gender or case. Also note: "an" in German often maps to "at" or "on" in English, not "an".
</div>`,
quiz:[
  {q:"The conference takes place _____ 14 March.",opts:["in","on","at","by"],ans:1,fb:'"On" for specific dates: on 14 March, on Monday, on my birthday.'},
  {q:"I\'ll see you _____ the morning.",opts:["on","at","by","in"],ans:3,fb:'"In the morning / afternoon / evening" — but "at night" is the exception. Also: "at noon", "at midnight".'},
  {q:"She was born _____ 1989 _____ a cold Tuesday morning.",opts:["in / on","on / in","at / in","in / at"],ans:0,fb:'Year → "in 1989". Day + part of day → "on a Tuesday morning" (the day takes priority).'},
  {q:"We are meeting _____ the lobby _____ 3 PM.",opts:["in / on","at / in","in / at","on / at"],ans:2,fb:'"In the lobby" (enclosed space). "At 3 PM" (precise time).'},
  {q:"The keys are _____ the table.",opts:["in","at","on","between"],ans:2,fb:'"On" for surfaces — the keys are lying on top of the table surface.'},
  {q:"She lives _____ the third floor.",opts:["at","in","on","between"],ans:2,fb:'"On the third floor" — floors are surfaces/levels → "on". Contrast: "in the building" (enclosed space).'},
  {q:"He waited _____ the bus stop for 20 minutes.",opts:["in","on","at","next"],ans:2,fb:'"At" for specific points and locations: at the bus stop, at the airport, at the corner.'},
  {q:"I always feel nervous _____ job interviews.",opts:["at","in","on","for"],ans:0,fb:'"At" is used with events and specific occasions: at a meeting, at an interview, at a concert, at a party.'},
]},

// ─── B1 ────────────────────────────────────────────
{id:'b1_present_continuous', level:'B1', icon:'🔄', title:'Present Continuous',
explain:`
<div class="explain-block">
  <div class="block-label">Three main uses</div>
  Present Continuous (= am/is/are + -ing) is used for: (1) actions happening right now, (2) temporary situations, and (3) fixed future arrangements.
  <div class="formula">Subject + am / is / are + verb-ing</div>
  <div class="ex-row"><span class="ex-tag">now</span><span class="ex-neutral">She <em>is writing</em> the report. (right at this moment)</span></div>
  <div class="ex-row"><span class="ex-tag">temp</span><span class="ex-neutral">I <em>am living</em> in a hotel this month. (not permanent)</span></div>
  <div class="ex-row"><span class="ex-tag">future</span><span class="ex-neutral">We <em>are meeting</em> the client on Friday. (diary entry)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Spelling of the -ing form</div>
  Most verbs: just add <em>-ing</em> → working, playing.<br>
  Verbs ending in -e: drop the e, add <em>-ing</em> → writing, making, coming.<br>
  Short verbs (CVC): double final consonant → running, sitting, beginning.<br>
  Verbs ending in -ie: change to y + <em>-ing</em> → lying, dying.
</div>
<div class="explain-block">
  <div class="block-label">State verbs — NEVER use continuous!</div>
  Some verbs describe <em>states</em> (not actions) and cannot be used in continuous form:
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">I am knowing the answer. / She is wanting coffee.</span></div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">I know the answer. / She wants coffee.</span></div>
  Common state verbs: <em>know, want, like, love, hate, believe, understand, seem, need, prefer, contain, belong, mean, own</em>
</div>
<div class="explain-block">
  <div class="block-label">Present Simple vs. Present Continuous</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">I <em>work</em> in Frankfurt. (permanent job — Present Simple)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">I <em>am working</em> from home today. (temporary — Present Continuous)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">She <em>always complains</em>. (habit — Present Simple)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">She <em>is always complaining</em>! (annoying habit — Continuous for irritation)</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  German has no equivalent continuous tense. "Er arbeitet" can mean both "he works" and "he is working". In English these are strictly separate. When something is happening right now or is temporary, you must use the -ing form. Translating German Präsens word-for-word can give you the wrong tense in English.
</div>`,
quiz:[
  {q:"She _____ a report right now.",opts:["writes","is writing","write","was writing"],ans:1,fb:'Action happening at this exact moment → Present Continuous: is + writing.'},
  {q:"I _____ this question.",opts:["am not understanding","don't understand","isn't understanding","not understand"],ans:1,fb:'"Understand" is a state verb — never use continuous. Use Present Simple: "I don\'t understand."'},
  {q:"They _____ at a hotel this week.",opts:["stay","are staying","stays","have stayed"],ans:1,fb:'Temporary situation (this week only, not permanent) → Present Continuous: are + staying.'},
  {q:"Listen! Someone _____ at the door.",opts:["knocks","is knocking","knock","has knocked"],ans:1,fb:'"Listen!" tells us it\'s happening right now → Present Continuous: is + knocking.'},
  {q:"What _____ you _____ tonight?",opts:["are / doing","do / do","will / doing","is / do"],ans:0,fb:'Fixed future arrangement (plan for tonight) → Present Continuous: are you doing?'},
  {q:"She _____ classical music.",opts:["is loving","loves","loving","has loved"],ans:1,fb:'"Love" is a state verb → always Present Simple. "She loves" not "she is loving".'},
  {q:"We _____ our operations into new markets.",opts:["currently expand","are currently expanding","is currently expanding","expand currently"],ans:1,fb:'Temporary current action → Present Continuous. "Are currently expanding" — "currently" reinforces the temporary nature.'},
  {q:"He _____ late to meetings!",opts:["always is","is always being","is always","is always coming"],ans:3,fb:'"Is always coming late" — using Continuous with "always" expresses an annoying habitual behaviour.'},
]},

{id:'b1_comparatives', level:'B1', icon:'📊', title:'Comparatives & Superlatives',
explain:`
<div class="explain-block">
  <div class="block-label">Short adjectives (1–2 syllables)</div>
  Add <em>-er</em> for comparative, <em>the -est</em> for superlative.
  <div class="formula">fast → faster (than) → the fastest<br>big → bigger → the biggest (double consonant!)<br>easy → easier → the easiest (y → ier)</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Frankfurt is <em>larger than</em> Wiesbaden, but <em>the largest</em> city is Berlin.</span></div>
  Always use <em>than</em> in comparisons: "bigger than", not "bigger as" (a common German mistake!).
</div>
<div class="explain-block">
  <div class="block-label">Long adjectives (3+ syllables)</div>
  Use <em>more</em> for comparative, <em>the most</em> for superlative. Never add -er/-est!
  <div class="formula">expensive → more expensive (than) → the most expensive<br>interesting → more interesting → the most interesting</div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">expensiver · interestingest</span></div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">more expensive · the most interesting</span></div>
  Note: some 2-syllable adjectives can go either way: <em>clever → cleverer / more clever</em>.
</div>
<div class="explain-block">
  <div class="block-label">Irregular adjectives</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">good → <em>better</em> → <em>the best</em></span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">bad → <em>worse</em> → <em>the worst</em></span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">far → <em>further / farther</em> → <em>the furthest / farthest</em></span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">little → <em>less</em> → <em>the least</em></span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">much / many → <em>more</em> → <em>the most</em></span></div>
</div>
<div class="explain-block">
  <div class="block-label">Equality and inequality</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">As fast <em>as</em>: Frankfurt is as big as Lyon.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Not as … as: Hamburg is not as warm as Madrid.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Much/far/a lot + comparative: This is <em>far more complex</em> than expected.</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  "Größer als" = "bigger than" — but English uses "than", not "as" (German "als"). "So groß wie" = "as big as". The structure is very similar; just replace "als" with "than" and "so … wie" with "as … as".
</div>`,
quiz:[
  {q:"This hotel is _____ that one.",opts:["more expensive than","expensiver than","most expensive than","expensivest than"],ans:0,fb:'"Expensive" (3 syllables) → "more expensive than". Never "expensiver".'},
  {q:"He is _____ player on the team.",opts:["the more good","the best","the goodest","the better"],ans:1,fb:'"Good" is irregular: good → better → the best. Always "the" before superlatives.'},
  {q:"Today is _____ day of the year.",opts:["the hotest","the most hot","hotter","the hottest"],ans:3,fb:'"Hot" (CVC) → double t: hottest. Always "the" before superlatives. Never "the most hot".'},
  {q:"This solution is _____ the previous one.",opts:["more bad than","badder than","worse than","worst than"],ans:2,fb:'"Bad" is irregular: bad → worse (comparative). Worst = superlative. Always "than" after comparatives.'},
  {q:"The report is _____ I expected.",opts:["more long than","most long than","longest than","longer than"],ans:3,fb:'"Long" → "longer than". Short 1-syllable adjectives add -er. Always "than" — never "as" for comparisons.'},
  {q:"She is _____ member of the department.",opts:["the most talented","the more talented","the talentedest","more talented"],ans:0,fb:'"Talented" (3 syllables) → "the most talented". Superlatives need "the".'},
  {q:"My performance is getting _____.",opts:["more good","gooder","better","best"],ans:2,fb:'"Good" comparative: better. "Getting better" = improving over time (no "than" needed here).'},
  {q:"His presentation was _____ mine.",opts:["much better than","much more better than","much good than","much best than"],ans:0,fb:'"Much better than" = significantly better. You can intensify comparatives with: much, far, a lot, slightly.'},
]},

// ─── B2 ────────────────────────────────────────────
{id:'b2_present_perfect', level:'B2', icon:'⏱', title:'Present Perfect',
explain:`
<div class="explain-block">
  <div class="block-label">The golden rule</div>
  Present Perfect connects the <em>past to the present</em>. The action happened in the past, but its result, relevance, or time period is still connected to now. This is the most important difference from Past Simple.
  <div class="formula">Subject + have / has + past participle</div>
  <div class="ex-row"><span class="ex-tag">PP</span><span class="ex-neutral">I <em>have lost</em> my keys. (I don't have them now — result matters now)</span></div>
  <div class="ex-row"><span class="ex-tag">PS</span><span class="ex-neutral">I <em>lost</em> my keys yesterday. (finished event, specific time)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Four main uses</div>
  <div class="ex-row"><span class="ex-tag">1</span><span class="ex-neutral"><em>Life experience</em> (ever/never): Have you ever been to Japan?</span></div>
  <div class="ex-row"><span class="ex-tag">2</span><span class="ex-neutral"><em>Recent action, result now</em> (just/already): She has just finished. The door is open — someone has opened it.</span></div>
  <div class="ex-row"><span class="ex-tag">3</span><span class="ex-neutral"><em>Unfinished time period</em> (today/this year/so far): I have sent five emails today.</span></div>
  <div class="ex-row"><span class="ex-tag">4</span><span class="ex-neutral"><em>Duration to now</em> (since/for): We have worked here for ten years / since 2014.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Signal words</div>
  <div class="formula">Present Perfect: ever · never · just · already · yet · recently · lately · so far · since · for · this week/month/year · it's the first time<br><br>Past Simple: yesterday · last week · in 2020 · ago · when · at 8 PM · on Monday</div>
</div>
<div class="warn-box">
  <div class="warn-label">⚠ Never mix these</div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">I have visited London in 2019. / She has called him yesterday.</span></div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">I visited London in 2019. / She called him yesterday.</span></div>
  Specific past time (in 2019, yesterday) → always Past Simple. Never Present Perfect.
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  German Perfekt ("Ich habe gearbeitet") is used in everyday speech for any past event. English Present Perfect is much more restricted — it requires a link to the present. "Ich habe ihn gestern gesehen" → "I saw him yesterday" (Past Simple, NOT "I have seen him yesterday").
</div>`,
quiz:[
  {q:"She _____ the report.",opts:["just finished","has just finished","just has finished","finished just"],ans:1,fb:'"Just" + Present Perfect: have/has + just + past participle. Word order: has → just → past participle.'},
  {q:"I _____ sushi.",opts:["never tried","have never tried","never have tried","had never tried"],ans:1,fb:'Life experience with "never" → Present Perfect: have + never + past participle.'},
  {q:"We _____ the invoice yet.",opts:["didn't receive","hadn't received","haven't received","don't receive"],ans:2,fb:'"Yet" in negative → Present Perfect: haven\'t + past participle. "Didn\'t receive" would need a specific past time.'},
  {q:"This is the best film I _____ seen.",opts:["ever saw","have ever seen","ever have seen","had ever seen"],ans:1,fb:'Superlative + "ever" → Present Perfect: have + ever + past participle. Classic pattern.'},
  {q:"How long _____ each other?",opts:["did you know","do you know","have you known","had you known"],ans:2,fb:'"How long" + ongoing state to now → Present Perfect: have + past participle. "Known" is the past participle of "know".'},
  {q:"The client _____ the contract.",opts:["already signed","has already signed","already has signed","had already signed"],ans:1,fb:'"Already" in Present Perfect: has + already + past participle. "Already" goes between have and the past participle.'},
  {q:"They _____ in Frankfurt since 2015.",opts:["live","lived","are living","have lived"],ans:3,fb:'"Since" + unfinished period → Present Perfect: have/has + past participle. They still live there now.'},
  {q:"_____ you ever _____ a famous person?",opts:["Did / meet","Have / met","Had / met","Do / meet"],ans:1,fb:'Life experience question: Have + subject + ever + past participle. "Met" is the past participle of "meet".'},
]},

{id:'b2_conditionals', level:'B2', icon:'🔀', title:'Conditionals (0 – 3)',
explain:`
<div class="explain-block">
  <div class="block-label">Zero Conditional — general truth</div>
  For facts that are always true: scientific laws, instructions, habits. Both clauses use Present Simple.
  <div class="formula">If + present simple → present simple</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If you heat ice, it melts. (always true)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If you press this button, the machine stops. (instruction)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">First Conditional — real future</div>
  For situations that are <em>possible or likely</em> in the future. The result is a real prediction.
  <div class="formula">If + present simple → will + base verb</div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">If the fund performs well, we will recommend it.</span></div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">If the fund will perform well… (NEVER "will" directly after "if"!)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Second Conditional — hypothetical present or future</div>
  For imagined, unlikely, or impossible situations <em>now or in the future</em>.
  <div class="formula">If + past simple → would + base verb</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If I <em>were</em> the CEO, I would restructure the company. (I'm not the CEO)</span></div>
  <div class="ex-row"><span class="ex-tag">💡</span><span class="ex-neutral">"If I <em>were</em>" (not "was") — formal subjunctive, preferred in writing and professional English.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Third Conditional — unreal past / regret</div>
  For imagined situations in the past that did not happen. Often expresses regret.
  <div class="formula">If + past perfect → would have + past participle</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If I had known earlier, I would have invested differently. (I didn't know → I didn't invest differently)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If she hadn't missed the train, she would have arrived on time.</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  "Wenn ich mehr Zeit hätte, würde ich..." = Second Conditional. "Wenn ich mehr Zeit gehabt hätte, hätte ich..." = Third Conditional. The grammar logic is identical, but English uses "would have + past participle" where German uses "hätte + past participle". The word order in English is simpler — no verb-final clause.
</div>`,
quiz:[
  {q:"If you heat ice, it _____ (melt).",opts:["would melt","melts","will melt","melted"],ans:1,fb:'Zero conditional (scientific fact) → If + present, present. "Melts" — present simple.'},
  {q:"If I _____ (be) you, I would accept the offer.",opts:["am","was","were","will be"],ans:2,fb:'Second conditional: formal subjunctive uses "were" for all persons — even "I". Not "was" in formal writing.'},
  {q:"If she _____ (study) harder, she will pass.",opts:["studied","studies","will study","studying"],ans:1,fb:'First conditional: If + present simple. "Studies" (he/she/it) — the condition is possible/real.'},
  {q:"If we had invested earlier, we _____ (make) more profit.",opts:["would make","will have made","would have made","had made"],ans:2,fb:'Third conditional result: would have + past participle. The investment didn\'t happen → we didn\'t make the profit.'},
  {q:"What _____ you do if you _____ (lose) your job?",opts:["will / lose","would / lost","do / lose","would / will lose"],ans:1,fb:'Second conditional: "would + do" (result) / "If + lost" (condition → past simple). Imagined/unlikely.'},
  {q:"If it _____ (not / rain), we can have lunch outside.",opts:["doesn't rain","won't rain","didn't rain","hadn't rained"],ans:0,fb:'First conditional → If + present simple negative: "doesn\'t rain". The result uses "can" (not just "will").'},
  {q:"She _____ a director now if she _____ (take) that job.",opts:["would / took","would / had taken","will / took","had / taken"],ans:1,fb:'Third conditional: would + be (result) / if + had taken (past perfect condition). She didn\'t take it → she\'s not director now.'},
  {q:"If you press this button, the machine _____.",opts:["would stop","stopped","stops","will stop"],ans:2,fb:'Zero conditional (instruction manual) → both present simple. Always true.'},
]},

{id:'b2_passive', level:'B2', icon:'🔄', title:'Passive Voice',
explain:`
<div class="explain-block">
  <div class="block-label">When and why to use the passive</div>
  Use the passive when (1) you don't know who did something, (2) it's obvious or unimportant who did it, or (3) you want to emphasise the action or result rather than the person. Very common in formal, academic, and business writing.
  <div class="formula">Subject + to be (correct tense) + past participle [+ by + agent]</div>
</div>
<div class="explain-block">
  <div class="block-label">All tenses in passive</div>
  <div class="ex-row"><span class="ex-tag">Pres</span><span class="ex-neutral"><em>is/are reviewed</em> — The report is reviewed weekly.</span></div>
  <div class="ex-row"><span class="ex-tag">Past</span><span class="ex-neutral"><em>was/were launched</em> — The fund was launched in 2010.</span></div>
  <div class="ex-row"><span class="ex-tag">Perf</span><span class="ex-neutral"><em>has/have been signed</em> — The contract has been signed.</span></div>
  <div class="ex-row"><span class="ex-tag">Cont</span><span class="ex-neutral"><em>is/are being reviewed</em> — The strategy is being reviewed.</span></div>
  <div class="ex-row"><span class="ex-tag">Fut</span><span class="ex-neutral"><em>will be announced</em> — Results will be published tomorrow.</span></div>
  <div class="ex-row"><span class="ex-tag">Mod</span><span class="ex-neutral"><em>must/should be submitted</em> — This form must be submitted by Friday.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Active → Passive transformation</div>
  <div class="ex-row"><span class="ex-tag">A</span><span class="ex-neutral">The auditor <em>signed</em> the document. (active)</span></div>
  <div class="ex-row"><span class="ex-tag">P</span><span class="ex-neutral">The document <em>was signed</em> by the auditor. (passive)</span></div>
  The object of the active sentence becomes the subject of the passive. The agent (who did it) goes at the end with "by" — or is omitted entirely.
</div>
<div class="warn-box">
  <div class="warn-label">⚠ German false friend — "werden" vs. "become"</div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">The letter became sent yesterday.</span></div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">The letter was sent yesterday.</span></div>
  "Wurde" in German passive = "was" in English (NOT "became"). "Become" means to change state: "She became a manager."
</div>`,
quiz:[
  {q:"The contract _____ yesterday.",opts:["signed","was signed","has signed","is signed"],ans:1,fb:'Specific past time (yesterday) → Past Simple Passive: was + past participle. "Signed" alone is active.'},
  {q:"All applications must _____ by Monday.",opts:["submit","be submitted","submitted","have submitted"],ans:1,fb:'Modal passive: modal + be + past participle. "Must be submitted" = müssen eingereicht werden.'},
  {q:"The new policy _____ across all departments right now.",opts:["currently implements","is currently being implemented","has currently implemented","currently implemented"],ans:1,fb:'Happening right now → Present Continuous Passive: is/are + being + past participle.'},
  {q:"The results _____ at tomorrow\'s press conference.",opts:["announce","announced","are announced","will be announced"],ans:3,fb:'Future passive (tomorrow) → will + be + past participle.'},
  {q:"By next year, 50 new branches _____ (open).",opts:["will open","will be opened","are opened","open"],ans:1,fb:'Future passive: will + be + past participle. The subject (branches) receives the action.'},
  {q:"The report _____ by a senior analyst before the board meeting.",opts:["was written","wrote","has written","is written"],ans:0,fb:'Past Simple Passive with agent ("by a senior analyst"): was + past participle.'},
  {q:"Which sentence contains a typical German-speaker mistake?",opts:["The file was sent this morning.","The error has been corrected.","The contract became signed last week.","The data will be reviewed."],ans:2,fb:'"Became" cannot form the passive. "Wurde unterschrieben" = "was signed", not "became signed".'},
  {q:"The merger _____ by the board yet.",opts:["wasn't approved","isn't approved","hasn't been approved","hadn't been approved"],ans:2,fb:'"Yet" → Present Perfect Passive: hasn\'t + been + past participle. Action started but not completed.'},
]},

// ─── C1 ────────────────────────────────────────────
{id:'c1_inversion', level:'C1', icon:'🔃', title:'Inversion',
explain:`
<div class="explain-block">
  <div class="block-label">What is inversion and why use it?</div>
  Inversion means placing the <em>auxiliary verb before the subject</em>. Normal English word order is Subject → Verb → Object. Inversion reverses Subject and Auxiliary for emphasis or formality. It is triggered by certain negative or restrictive adverbials placed at the start of a sentence.
  <div class="formula">Negative adverb + auxiliary + subject + main verb</div>
  <div class="ex-row"><span class="ex-tag">normal</span><span class="ex-neutral">I have never seen such a result.</span></div>
  <div class="ex-row"><span class="ex-tag">inverted</span><span class="ex-neutral"><em>Never have I seen</em> such a result. (stronger, more dramatic)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Common triggers + structures</div>
  <div class="ex-row"><span class="ex-tag">Never</span><span class="ex-neutral"><em>Never have I</em> witnessed such audacity.</span></div>
  <div class="ex-row"><span class="ex-tag">Rarely</span><span class="ex-neutral"><em>Rarely does</em> the BaFin grant exceptions to this rule.</span></div>
  <div class="ex-row"><span class="ex-tag">Not only</span><span class="ex-neutral"><em>Not only did</em> he submit late, but he also made errors. (second clause: normal order!)</span></div>
  <div class="ex-row"><span class="ex-tag">Hardly</span><span class="ex-neutral"><em>Hardly had</em> the meeting started <em>when</em> the alarm went off.</span></div>
  <div class="ex-row"><span class="ex-tag">No sooner</span><span class="ex-neutral"><em>No sooner had</em> we signed <em>than</em> problems arose.</span></div>
  <div class="ex-row"><span class="ex-tag">Under no circ.</span><span class="ex-neutral"><em>Under no circumstances should</em> you sign without legal review.</span></div>
  <div class="ex-row"><span class="ex-tag">Only after</span><span class="ex-neutral"><em>Only after the audit did</em> we realise the scale of the problem.</span></div>
  <div class="ex-row"><span class="ex-tag">So + adj</span><span class="ex-neutral"><em>So complex was</em> the case that three partners reviewed it.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Which auxiliary to use</div>
  Present/past → use <em>do/does/did</em> + base verb (if no other auxiliary exists).<br>
  Perfect → use <em>have/had</em> + past participle.<br>
  Modal → use the <em>modal verb</em> directly.
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Rarely <em>does she</em> make mistakes. (Present Simple → does)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Never <em>have I</em> seen this. (Present Perfect → have)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">Under no circumstances <em>should you</em> sign. (Modal → should)</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">🇩🇪 German comparison</div>
  German also uses inversion for emphasis ("Nie habe ich so etwas gesehen"), and the mechanism is similar — the verb moves to position 2. However, English inversion is more strictly tied to specific adverbials and is a key marker of formal written English at C1/C2 level.
</div>`,
quiz:[
  {q:"Rarely _____ such a profitable quarter.",opts:["we have seen","we saw","have we seen","did we have seen"],ans:2,fb:'"Rarely" triggers inversion. Present Perfect → have + subject + past participle: "have we seen".'},
  {q:"Not only _____ the deadline, but she also made serious errors.",opts:["did she miss","she missed","she did miss","has she missed"],ans:0,fb:'"Not only" triggers inversion → did + subject + base verb: "did she miss". The second clause ("but she also") uses normal word order.'},
  {q:"Under no circumstances _____ sign the contract without review.",opts:["you should","you must","do you","should you"],ans:3,fb:'"Under no circumstances" → modal inversion: should + subject: "should you sign". Strong formal prohibition.'},
  {q:"Hardly _____ the presentation when the fire alarm went off.",opts:["we had started","had we started","we started","did we start"],ans:1,fb:'"Hardly" triggers Past Perfect inversion: had + subject + past participle. Then "when" + Past Simple for the following event.'},
  {q:"Never before _____ such blatant disregard for the rules.",opts:["I have witnessed","have I witnessed","I witnessed","witnessed I"],ans:1,fb:'"Never before" → full inversion with Present Perfect: have + subject + past participle.'},
  {q:"Not until the audit was complete _____ the findings.",opts:["we published","did publish we","did we publish","we did publish"],ans:2,fb:'"Not until..." → inversion with Past Simple: did + subject + base verb.'},
  {q:"Only after the merger _____ how complex the integration was.",opts:["we realised","have we realised","did we realise","we had realised"],ans:2,fb:'"Only after..." → inversion: did + subject + base verb.'},
  {q:"So serious _____ that the board convened an emergency session.",opts:["was the situation","the situation was","the situation is","is the situation"],ans:0,fb:'"So + adjective + was + subject + that..." — inverted structure for emphasis. The past tense matches the context.'},
]},

{id:'c1_modals_advanced', level:'C1', icon:'🧠', title:'Advanced Modal Verbs',
explain:`
<div class="explain-block">
  <div class="block-label">Past modals — form</div>
  All past modals follow the same pattern:
  <div class="formula">Modal verb + have + past participle</div>
  This is one of the most tested areas at C1. The modal changes the meaning; "have + pp" places the action in the past.
</div>
<div class="explain-block">
  <div class="block-label">Deduction about the past</div>
  <div class="ex-row"><span class="ex-tag">100%</span><span class="ex-neutral"><em>must have done</em> — He must have left early. (I'm almost certain — strong evidence)</span></div>
  <div class="ex-row"><span class="ex-tag">~50%</span><span class="ex-neutral"><em>might / may / could have done</em> — She might have missed the train. (possible)</span></div>
  <div class="ex-row"><span class="ex-tag">0%</span><span class="ex-neutral"><em>can't / couldn't have done</em> — He can't have signed it — he wasn't there. (impossible)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Criticism & regret about the past</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>should have done</em> — I should have called. (I didn't, and I regret it)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>shouldn't have done</em> — You shouldn't have said that. (you did, it was wrong)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>could have done</em> — She could have told us. (she had the opportunity but didn't)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>would have done</em> — I would have helped if I'd known. (I didn't know → didn't help)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">needn't have vs. didn't need to</div>
  This is a subtle but important distinction:
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>I needn't have prepared</em> those slides — they cancelled the meeting. (I prepared them, but it was unnecessary)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>I didn't need to prepare</em> slides, so I didn't. (I knew it was unnecessary, so I didn't do it)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Present modals — key distinctions</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>must</em> — internal obligation (the speaker decides)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>have to</em> — external obligation (rules, other people decide)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>mustn't</em> — prohibition (you are forbidden)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>needn't / don't have to</em> — no obligation (it's optional)</span></div>
</div>`,
quiz:[
  {q:"You _____ submit this form — it\'s optional.",opts:["mustn't","needn't","shouldn't","couldn't"],ans:1,fb:'"Needn\'t" = no obligation (optional). "Mustn\'t" = prohibition (forbidden). Completely different! "Don\'t have to" also works.'},
  {q:"I left my umbrella at home. I _____ the weather forecast.",opts:["must have checked","could have checked","should have checked","might have checked"],ans:2,fb:'"Should have checked" = past regret — I didn\'t check it, and now I wish I had.'},
  {q:"He _____ be the new director — I saw his nameplate on the door.",opts:["should","could","must","might"],ans:2,fb:'"Must" for strong deduction based on concrete evidence (the nameplate). Near-certain conclusion.'},
  {q:"She _____ told me earlier — I would have helped!",opts:["could have","must have","should","needn't have"],ans:0,fb:'"Could have told" = she had the opportunity and ability to tell me but chose not to.'},
  {q:"I _____ prepared those slides — they weren\'t needed.",opts:["mustn't have","couldn't have","needn't have","shouldn't"],ans:2,fb:'"Needn\'t have prepared" = I did prepare them, but it turned out to be unnecessary. I wasted the effort.'},
  {q:"The lights are on — she _____ still be in the office.",opts:["must","might","can't","should"],ans:1,fb:'"Might" for ~50% possibility. "Must" would mean near-certainty. Both are possible, but "might" is more cautious.'},
  {q:"You _____ arrive on time — it\'s absolutely essential.",opts:["should","might","must","could"],ans:2,fb:'"Must" for strong obligation (the speaker insists). "Should" is merely advice or a weaker recommendation.'},
  {q:"They _____ the new system already — it wasn\'t even released yet.",opts:["must have tested","can't have tested","should have tested","needn't have tested"],ans:1,fb:'"Can\'t have tested" = logical impossibility in the past. 0% certainty — it\'s impossible they tested it before release.'},
]},

{id:'c1_reported_speech', level:'C1', icon:'💬', title:'Reported Speech',
explain:`
<div class="explain-block">
  <div class="block-label">The backshift rule</div>
  When you report what someone said (using a past reporting verb like "said", "told", "asked"), tenses shift one step back in time. This is called <em>backshift</em>.
  <div class="formula">present simple → past simple<br>present continuous → past continuous<br>past simple → past perfect<br>present perfect → past perfect<br>will → would · can → could · may → might · must → had to</div>
</div>
<div class="explain-block">
  <div class="block-label">Statements</div>
  <div class="ex-row"><span class="ex-tag">Direct</span><span class="ex-neutral">"We are reviewing the file." → She said they <em>were</em> reviewing the file.</span></div>
  <div class="ex-row"><span class="ex-tag">Direct</span><span class="ex-neutral">"I will call you back." → He said he <em>would</em> call back.</span></div>
  <div class="ex-row"><span class="ex-tag">Direct</span><span class="ex-neutral">"I have already sent it." → She said she <em>had already sent</em> it.</span></div>
  Note: if the reported situation is still true now, you can sometimes keep the original tense: "She said the Earth is round."
</div>
<div class="explain-block">
  <div class="block-label">Questions in reported speech</div>
  No inversion! Use <em>if / whether</em> for yes/no questions. Use the question word for wh-questions.
  <div class="formula">Direct: "Are you available?" → Reported: She asked if I was available.<br>Direct: "Where do you work?" → Reported: He asked where I worked.</div>
  <div class="ex-row"><span class="ex-tag">✓</span><span class="ex-correct">She asked whether the meeting had been rescheduled.</span></div>
  <div class="ex-row"><span class="ex-tag">✗</span><span class="ex-wrong">She asked if was the meeting rescheduled. (wrong — no inversion!)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Commands and requests</div>
  <div class="formula">told + object + (not) + to + infinitive</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">"Submit the report!" → He told her <em>to submit</em> the report.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">"Don't be late!" → She told them <em>not to be</em> late.</span></div>
</div>`,
quiz:[
  {q:'"I have already sent the invoice." → He said he _____ the invoice.',opts:["has already sent","already sent","had already sent","would already send"],ans:2,fb:'Present Perfect → Past Perfect in reported speech: have sent → had sent.'},
  {q:'"Will the meeting be cancelled?" → She asked _____ cancelled.',opts:["whether the meeting would be","if would the meeting be","that the meeting would be","whether would the meeting be"],ans:0,fb:'Reported yes/no question: whether/if + subject + verb (no inversion). will → would (backshift).'},
  {q:'"We are working on it." → They said they _____ on it.',opts:["are working","have been working","worked","were working"],ans:3,fb:'Present Continuous → Past Continuous: are working → were working.'},
  {q:'"Don\'t submit it yet." → She told him _____ it yet.',opts:["don't submit","not to submit","to not submit","that not submit"],ans:1,fb:'Reported negative command: told + object + not + to + infinitive.'},
  {q:'"Where do you work?" → He asked _____ .',opts:["where I worked","where did I work","where I work","where worked I"],ans:0,fb:'Reported wh-question: no inversion, backshift (work → worked). Statement word order.'},
  {q:'"I can finish it by tomorrow." → She said she _____ it by the next day.',opts:["can finish","will finish","could finish","would finish"],ans:2,fb:'"Can" → "could" in reported speech (backshift). "Tomorrow" also shifts to "the next day".'},
  {q:'"We must review this." → He said they _____ review it.',opts:["must","have to","should","had to"],ans:3,fb:'"Must" (obligation) → "had to" in reported speech. "Must" has no past form, so "had to" is always used.'},
  {q:'"I saw him last week." → She told me she _____ him the week before.',opts:["saw","has seen","had seen","was seeing"],ans:2,fb:'Past Simple → Past Perfect in reported speech: saw → had seen. "Last week" also shifts to "the week before".'},
]},

// ─── C2 ────────────────────────────────────────────
{id:'c2_cleft_sentences', level:'C2', icon:'✂️', title:'Cleft Sentences',
explain:`
<div class="explain-block">
  <div class="block-label">What are cleft sentences?</div>
  A cleft sentence splits a normal sentence into two clauses in order to <em>emphasise one specific element</em>. They are essential in academic and formal writing at C2 level. The key word is "cleft" = split.
  <div class="ex-row"><span class="ex-tag">Normal</span><span class="ex-neutral">John signed the contract in 2018.</span></div>
  <div class="ex-row"><span class="ex-tag">It-cleft</span><span class="ex-neutral"><em>It was John</em> who signed the contract. (emphasis on JOHN)</span></div>
  <div class="ex-row"><span class="ex-tag">It-cleft</span><span class="ex-neutral"><em>It was in 2018</em> that John signed the contract. (emphasis on WHEN)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">It-clefts</div>
  The most common type. Always use "that" — except for people, where "who" is preferred (though "that" is also grammatically correct).
  <div class="formula">It is/was + [emphasised element] + that/who + rest of clause</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">It was <em>the new regulation</em> that caused all the delays.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">It was <em>not until midnight</em> that they reached an agreement.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">What-clefts</div>
  Used to emphasise what the subject wants, needs, or did. The "what-clause" acts as the subject.
  <div class="formula">What + subject + verb + is/was + [emphasis]</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>What I need</em> is more time. (= The thing I need is more time)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>What surprised me</em> was his sudden resignation.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>What we did</em> was [to] restructure the entire department.</span></div>
  The "what-clause" is singular → use "is/was", not "are/were".
</div>
<div class="explain-block">
  <div class="block-label">All-clefts & other variations</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>All I want</em> is a straight answer. (nothing more, nothing less)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>The thing that</em> worries me most is the timeline.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>The reason why</em> we failed is clear.</span></div>
</div>`,
quiz:[
  {q:"It was _____ who first proposed the plan.",opts:["the CEO that","the CEO","the CEO which","the CEO who"],ans:3,fb:'"It was + person + who" — "who" is preferred for people in cleft sentences (though "that" is technically also possible).'},
  {q:"What the team needs _____ better communication.",opts:["are","is","were","has been"],ans:1,fb:'"What + clause" acts as a singular subject → "is". The whole "what-clause" is treated as one thing.'},
  {q:"It _____ in Frankfurt that the deal was finalised.",opts:["is","has been","was","were"],ans:2,fb:'Past event → "was". The structure is: It + was + [emphasis] + that.'},
  {q:"_____ I want is a straight answer.",opts:["That","Which","What","All what"],ans:2,fb:'"What I want is..." — "what" introduces the cleft clause. "All what" is incorrect — use just "All I want" or "What I want".'},
  {q:"It was not until midnight _____ they finally agreed.",opts:["when","that","which","where"],ans:1,fb:'"It was not until... that..." — always "that" in cleft sentences, even with time expressions.'},
  {q:"All _____ is a clear explanation.",opts:["that I need","I need","what I need","I needed"],ans:1,fb:'"All I need is..." — after "all", use subject + verb directly, without "that" or "what".'},
  {q:"What _____ me was the sudden change of direction.",opts:["surprised","did surprise","has surprised","surprising"],ans:0,fb:'"What surprised me was..." — use simple past to match the past context.'},
  {q:"It was _____ that the regulation was first introduced.",opts:["in 2018 when","in 2018 which","in 2018","in 2018 that"],ans:3,fb:'"It was + time expression + that" — always "that" in this cleft structure.'},
]},

{id:'c2_mixed_conditionals', level:'C2', icon:'🔮', title:'Mixed Conditionals',
explain:`
<div class="explain-block">
  <div class="block-label">Why mixed conditionals exist</div>
  Standard conditionals (1, 2, 3) keep time frames consistent. But in real life, a past action often has a <em>present consequence</em>, or a present state explains a <em>past outcome</em>. Mixed conditionals combine time frames across the two clauses.
</div>
<div class="explain-block">
  <div class="block-label">Type 1: Past condition → Present result (most common)</div>
  Something didn't happen in the past → and as a result, the present situation is different now.
  <div class="formula">If + past perfect → would + base verb (present)</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If I <em>had studied</em> law, I <em>would be</em> a lawyer now. (I didn't study law → I'm not a lawyer now)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If she <em>hadn't missed</em> that flight, she <em>would be</em> here with us now.</span></div>
  Note: "would be" not "would have been" — the result is about NOW.
</div>
<div class="explain-block">
  <div class="block-label">Type 2: Present state → Past result (less common)</div>
  A permanent characteristic or present situation explains why something didn't happen in the past.
  <div class="formula">If + past simple (present state) → would have + past participle</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If I <em>were</em> braver, I <em>would have spoken</em> up at that meeting. (I'm not brave → I didn't speak up)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral">If she <em>were</em> more organised, she <em>would have submitted</em> it on time.</span></div>
</div>
<div class="explain-block">
  <div class="block-label">How to identify which type to use</div>
  Ask yourself: <em>What is "now" and what is "then"?</em><br><br>
  • Past condition, present result → "If + had done... would + do now"<br>
  • Present character, past result → "If + were... would have + done then"
  <div class="ex-row"><span class="ex-tag">key</span><span class="ex-neutral">If I had invested earlier, I <em>would be</em> rich now. (past action → present state)</span></div>
  <div class="ex-row"><span class="ex-tag">key</span><span class="ex-neutral">If I were wiser, I <em>would have invested</em> then. (present trait → past decision)</span></div>
</div>`,
quiz:[
  {q:"If she _____ (take) the other job, she _____ (be) a director now.",opts:["took / would be","had taken / would be","had taken / would have been","took / would have been"],ans:1,fb:'Past condition (didn\'t take the job) → present result (not director now): If + past perfect → would + base verb.'},
  {q:"If I _____ (be) more disciplined, I _____ (finish) the project on time last month.",opts:["was / would finish","were / would have finished","had been / would finish","were / had finished"],ans:1,fb:'Present state (I\'m not disciplined) → past result (didn\'t finish): If + were → would have + past participle.'},
  {q:"He _____ (not / be) in debt now if he _____ (not / spend) so carelessly.",opts:["wouldn't be / hadn't spent","wouldn't have been / didn't spend","wouldn't be / didn't spend","wasn't / hadn't spent"],ans:0,fb:'Past condition → present result: would + be (present state now) / if + had + past participle.'},
  {q:"If I _____ (know) about the risk, I _____ (never / invest) in that fund.",opts:["knew / would never invest","had known / would never have invested","knew / would never have invested","had known / would never invest"],ans:1,fb:'Pure third conditional (past → past): If + had known → would never have invested. Both actions in the past.'},
  {q:"She _____ (speak) better English now if she _____ (attend) that course.",opts:["would speak / had attended","would have spoken / attended","spoke / had attended","would speak / attended"],ans:0,fb:'Past condition → present result: would + speak (now) / if + had attended (past action).'},
  {q:"If I _____ (be) taller, I _____ (become) a basketball player back then.",opts:["were / would become","was / would have become","were / would have become","had been / would become"],ans:2,fb:'Present state (I\'m not tall) → past result (didn\'t become a player): If + were → would have + past participle.'},
  {q:"They _____ (be) bankrupt now if the government _____ (not / intervene).",opts:["would have been / didn't intervene","would be / hadn't intervened","would be / didn't intervene","had been / hadn't intervened"],ans:1,fb:'Past condition (intervention happened) → present result (they\'re not bankrupt now): would + be / if + hadn\'t + past participle.'},
  {q:"If she _____ (take) better care of her health, she _____ (not / be) in hospital now.",opts:["had taken / wouldn't be","took / wouldn't have been","had taken / wouldn't have been","takes / wouldn't be"],ans:0,fb:'Past action (didn\'t take care) → present state (in hospital now): If + had taken → wouldn\'t + be (now).'},
]},

{id:'c2_discourse_markers', level:'C2', icon:'📝', title:'Discourse Markers',
explain:`
<div class="explain-block">
  <div class="block-label">What are discourse markers?</div>
  Discourse markers are words and phrases that <em>structure, connect, and signal relationships between ideas</em>. They are what makes a text or speech flow coherently. Mastering them is essential for C2-level writing and formal speech.
</div>
<div class="explain-block">
  <div class="block-label">Contrast & Concession</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Nevertheless / nonetheless</em> — despite this, we will proceed. (strong contrast)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Whereas / while</em> — the east branch is profitable, whereas the west is struggling. (direct contrast)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Albeit</em> — the plan is ambitious, albeit risky. (= even though it is, formal)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Granted / admittedly</em> — Granted, the proposal has flaws, but it deserves consideration.</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>That said / that being said</em> — informal equivalent of "nevertheless"</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Addition & Emphasis</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Furthermore / moreover</em> — in addition, adding a stronger point</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>What is more</em> — informal alternative to "furthermore"</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Indeed / in fact</em> — emphasising or confirming a previous point</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Not to mention</em> — and also (making a less important addition seem parenthetical)</span></div>
</div>
<div class="explain-block">
  <div class="block-label">Cause & Result</div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Hence / thus / thereby</em> — formal, meaning "therefore" or "as a result"</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Consequently / as a consequence</em> — neutral formal result marker</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>Thereby + -ing</em> — The costs were cut, <em>thereby reducing</em> the deficit. (direct result)</span></div>
  <div class="ex-row"><span class="ex-tag">→</span><span class="ex-neutral"><em>It follows that</em> — logical conclusion: "It follows that reform is necessary."</span></div>
</div>
<div class="tip-box">
  <div class="tip-label">💡 Register tip</div>
  "Nevertheless" and "nonetheless" are interchangeable — use either. "Albeit" is very formal and goes before an adjective or short phrase, not a full clause: "ambitious <em>albeit</em> risky" ✓ — "albeit it is risky" ✗. "Thereby" is always followed by -ing (gerund).
</div>`,
quiz:[
  {q:"The results were disappointing. _____, we will proceed.",opts:["Therefore","Hence","Nevertheless","Thus"],ans:2,fb:'"Nevertheless" (= despite this) — concessive. We continue despite the disappointment. "Therefore/Hence" would mean the results caused us to proceed, which doesn\'t fit.'},
  {q:"The plan is ambitious _____ achievable.",opts:["albeit","although","whereas","despite"],ans:0,fb:'"Albeit" = even though (formal, before adjective/phrase). "ambitious albeit achievable" — the plan has this quality despite also having the other. "Although" would need a full clause.'},
  {q:"The costs were reduced. _____, overall efficiency improved.",opts:["Albeit","Whereas","Moreover","Nevertheless"],ans:2,fb:'"Moreover" adds a further positive point to what was already positive. "Furthermore" also works. "Nevertheless" would suggest contrast.'},
  {q:"_____ the eastern branch is profitable, the western one is struggling.",opts:["Moreover","Whereas","Nevertheless","Hence"],ans:1,fb:'"Whereas" introduces a direct contrast between two comparable subjects. "While" also works here.'},
  {q:"The merger failed, _____ destroying years of negotiation work.",opts:["thereby","hence","thus","therefore"],ans:0,fb:'"Thereby + -ing" = by doing so / as a direct result. It links the main clause directly to its consequence with a gerund.'},
  {q:"Granted, the proposal has flaws; _____, it deserves consideration.",opts:["therefore","albeit","nevertheless","whereas"],ans:2,fb:'"Granted... nevertheless" is a classic concession pattern. I concede the flaw, but argue the opposite conclusion.'},
  {q:"The regulation is complex and, _____, poorly understood.",opts:["moreover","furthermore","hence","thereby"],ans:2,fb:'"Hence" = therefore / as a result, placed mid-sentence with commas. The complexity causes the poor understanding.'},
  {q:"She delivered excellent results, not _____ under extreme pressure.",opts:["mention","to mention","mentioned","mentioning"],ans:1,fb:'"Not to mention" = and also (used to introduce an additional, noteworthy point parenthetically).'},
]},

]; // end TOPICS
