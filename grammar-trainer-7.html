<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Grammar Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0e;
  --bg2: #0d1018;
  --surface: #111318;
  --card: #161a22;
  --card2: #1c2130;
  --border: #252b38;
  --border2: #2e3647;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold3: #f5e0a0;
  --blue: #4a9eff;
  --blue2: #7ab8e8;
  --green: #4ecb71;
  --red: #ff5c5c;
  --purple: #a78bfa;
  --orange: #fb923c;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --radius: 14px;
  --radius-sm: 8px;
  --a1: #4ecb71; --a2: #38bdf8; --b1: #fbbf24; --b2: #fb923c; --c1: #f87171; --c2: #a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;overscroll-behavior:none;}

/* ── ANIMATED BACKGROUND ── */
.bg-glow {
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(201,168,76,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(74,158,255,.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(13,16,24,1) 0%, transparent 100%);
}
.bg-grid {
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image: linear-gradient(rgba(201,168,76,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── HEADER ── */
.header {
  position:fixed;top:0;left:0;right:0;height:56px;
  background: rgba(8,10,14,.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(201,168,76,.12);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  z-index:100;
}
.menu-btn {
  background:none;border:none;color:var(--text3);font-size:20px;
  cursor:pointer;padding:8px;line-height:1;border-radius:8px;
  transition:color .2s, background .2s;
}
.menu-btn:hover{color:var(--gold);background:rgba(201,168,76,.08);}

.logo-wrap{display:flex;flex-direction:column;line-height:1;}
.logo-main{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold2);letter-spacing:.02em;font-weight:600;}
.logo-sub{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text3);font-family:'JetBrains Mono',monospace;}

.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.hud-pill {
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:4px 10px;
  font-family:'JetBrains Mono',monospace;font-size:11px;
  transition: all .3s;
}
.hud-pill.streak{color:var(--orange);}
.hud-pill.xp{color:var(--gold2);}

/* ── OVERLAY + DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}

.drawer {
  position:fixed;top:0;left:0;bottom:0;width:88vw;max-width:320px;
  background:linear-gradient(160deg, #0f1219 0%, #0b0e15 100%);
  border-right:1px solid rgba(201,168,76,.12);
  z-index:300;transform:translateX(-100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0);}

.drawer-top {
  padding:20px 16px 16px;
  border-bottom:1px solid rgba(201,168,76,.1);
  background:linear-gradient(135deg, rgba(201,168,76,.06) 0%, transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
}
.drawer-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold2);}
.drawer-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:6px;border-radius:6px;}

.drawer-body{flex:1;padding:12px 10px 60px;display:flex;flex-direction:column;gap:2px;}

.level-section{margin-bottom:6px;}
.level-head {
  display:flex;align-items:center;gap:8px;padding:10px 10px 6px;
}
.level-pip{width:8px;height:8px;border-radius:50%;}
.level-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;}
.level-lock-txt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.level-bar-wrap{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin:0 10px 8px;overflow:hidden;}
.level-bar-fill{height:100%;border-radius:1px;transition:width .5s cubic-bezier(.4,0,.2,1);}

.t-btn {
  background:none;border:none;color:var(--text2);
  font-family:'Crimson Pro',serif;font-size:14.5px;
  padding:9px 12px;border-radius:9px;cursor:pointer;
  text-align:left;display:flex;align-items:center;gap:8px;width:100%;
  transition:all .18s;position:relative;
}
.t-btn:hover{background:rgba(255,255,255,.04);color:var(--text);}
.t-btn.active{background:linear-gradient(90deg, rgba(201,168,76,.12), rgba(201,168,76,.04));color:var(--gold2);border-left:2px solid var(--gold);}
.t-btn.locked{opacity:.35;pointer-events:none;}
.t-icon{width:18px;flex-shrink:0;font-size:13px;}
.t-name{flex:1;}
.t-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.t-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;border-radius:10px;}
.t-badge.review{background:rgba(255,92,92,.15);color:var(--red);border:1px solid rgba(255,92,92,.3);}
.t-badge.bookmark{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.3);}

/* ── MAIN ── */
.main{margin-top:56px;margin-bottom:66px;position:relative;z-index:1;}
.pane{padding:20px 16px 28px;}

/* ── DASHBOARD ── */
.dash-hero {
  background:linear-gradient(135deg, rgba(201,168,76,.1) 0%, rgba(74,158,255,.05) 100%);
  border:1px solid rgba(201,168,76,.15);
  border-radius:18px;padding:20px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.dash-hero::before {
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle, rgba(201,168,76,.15) 0%, transparent 70%);
}
.dash-greeting{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold2);margin-bottom:4px;font-style:italic;}
.dash-sub{color:var(--text3);font-size:13.5px;line-height:1.5;}

.dash-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-card {
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 10px;text-align:center;
  transition:border-color .2s, transform .2s;
}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:3px;}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}

.continue-btn {
  width:100%;
  background:linear-gradient(135deg, var(--gold) 0%, #b8922a 100%);
  color:#0a0800;border:none;border-radius:12px;padding:15px;
  font-family:'Playfair Display',serif;font-size:16px;font-weight:600;
  cursor:pointer;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(201,168,76,.25);
  transition:transform .2s, box-shadow .2s;
}
.continue-btn:active{transform:scale(.98);}

.review-alert {
  background:linear-gradient(135deg, rgba(255,92,92,.08), rgba(255,92,92,.03));
  border:1px solid rgba(255,92,92,.25);border-radius:12px;
  padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:border-color .2s;
}
.review-alert:hover{border-color:rgba(255,92,92,.5);}
.review-count{font-family:'Playfair Display',serif;font-size:28px;color:var(--red);font-weight:600;min-width:40px;}
.review-info{flex:1;}
.review-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.review-sub{font-size:12.5px;color:var(--text3);}

.dash-section-lbl {
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-left:2px;
}
.level-row {
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .2s, transform .15s;
}
.level-row:active{transform:scale(.99);}
.level-row-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.level-row-info{flex:1;}
.level-row-name{font-size:14px;margin-bottom:5px;color:var(--text);}
.level-row-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.level-row-fill{height:100%;border-radius:2px;transition:width .5s;}
.level-row-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}

/* ── MODE BAR ── */
.mode-bar {
  position:fixed;bottom:0;left:0;right:0;height:66px;
  background:rgba(8,10,14,.9);backdrop-filter:blur(20px);
  border-top:1px solid rgba(201,168,76,.1);
  display:none;align-items:center;justify-content:center;gap:8px;padding:0 16px;z-index:100;
}
.mode-bar.visible{display:flex;}
.mode-btn {
  flex:1;max-width:170px;padding:10px 0;border-radius:10px;
  border:1px solid var(--border);background:none;
  color:var(--text3);font-family:'JetBrains Mono',monospace;
  font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:.03em;
}
.mode-btn:hover{border-color:var(--border2);color:var(--text2);}
.mode-btn.active {
  background:linear-gradient(135deg, rgba(201,168,76,.2), rgba(201,168,76,.08));
  border-color:rgba(201,168,76,.4);color:var(--gold2);
}

/* ── TOPIC HEADER ── */
.topic-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.level-tag {
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:20px;letter-spacing:.05em;
}
.topic-title {
  font-family:'Playfair Display',serif;font-size:28px;color:var(--gold2);
  line-height:1.2;margin-bottom:6px;font-style:italic;
}
.topic-subtitle{color:var(--text3);font-size:13px;letter-spacing:.05em;font-family:'JetBrains Mono',monospace;margin-bottom:20px;}

/* ── EXPLAIN BOXES ── */
.explain-block {
  background:linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;line-height:1.8;font-size:15px;
  position:relative;overflow:hidden;
  animation: fadeUp .4s ease both;
}
.explain-block::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(201,168,76,.3), transparent);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.block-label {
  font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;
  letter-spacing:.15em;color:var(--blue2);margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.block-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg, rgba(122,184,232,.3), transparent);}

.formula {
  background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.2);
  border-radius:8px;padding:10px 14px;
  font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--gold3);
  margin:12px 0;line-height:1.6;letter-spacing:.02em;
}

.ex-row {
  display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:14.5px;line-height:1.55;align-items:baseline;
}
.ex-row:last-child{border:none;}
.ex-tag {
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  min-width:28px;color:var(--text3);padding-top:3px;flex-shrink:0;
}
.ex-correct{color:var(--green);}
.ex-wrong{color:var(--red);text-decoration:line-through;opacity:.7;}
.ex-neutral{color:var(--text);}
em{color:var(--gold2);font-style:normal;font-weight:600;}

.tip-box {
  background:linear-gradient(135deg, rgba(167,139,250,.06) 0%, rgba(167,139,250,.02) 100%);
  border:1px solid rgba(167,139,250,.2);border-radius:10px;
  padding:14px 16px;margin-top:4px;margin-bottom:14px;font-size:14px;line-height:1.7;
}
.tip-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--purple);text-transform:uppercase;margin-bottom:8px;}

.warn-box {
  background:rgba(255,92,92,.05);border:1px solid rgba(255,92,92,.2);
  border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.7;
}
.warn-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--red);text-transform:uppercase;margin-bottom:8px;}

/* ── QUIZ ── */
.quiz-header{margin-bottom:16px;}
.quiz-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.q-pill{
  font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 11px;
  border-radius:20px;border:1px solid var(--border);background:var(--card);
}
.q-pill.main{color:var(--gold2);border-color:rgba(201,168,76,.3);}
.q-pill.review-p{color:var(--red);background:rgba(255,92,92,.08);border-color:rgba(255,92,92,.3);}
.q-pill.flag-p{color:var(--orange);background:rgba(251,146,60,.08);border-color:rgba(251,146,60,.3);}

.quiz-q {
  font-family:'Playfair Display',serif;font-size:19px;line-height:1.55;
  color:var(--text);margin-bottom:18px;font-weight:400;
}

.options{display:flex;flex-direction:column;gap:10px;}
.opt {
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 15px;color:var(--text2);
  font-family:'Crimson Pro',serif;font-size:15.5px;
  cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:12px;
  line-height:1.45;width:100%;transition:all .18s;
}
.opt:hover:not(:disabled){background:var(--card2);border-color:var(--border2);color:var(--text);}
.opt.correct{border-color:var(--green);color:var(--green);background:rgba(78,203,113,.07);}
.opt.wrong{border-color:var(--red);color:var(--red);background:rgba(255,92,92,.07);}
.opt-letter {
  width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;
  transition:background .18s;color:var(--text3);
}

.fb-box {
  background:linear-gradient(135deg, rgba(74,158,255,.06), rgba(74,158,255,.02));
  border:1px solid rgba(74,158,255,.2);border-radius:12px;
  padding:14px 16px;margin-top:14px;
  font-size:14.5px;line-height:1.7;color:var(--text2);display:none;
  animation:fadeUp .3s ease;
}
.fb-box.show{display:block;}
.fb-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue2);margin-bottom:8px;}

.btn-row{display:flex;gap:8px;margin-top:14px;}
.next-btn {
  flex:1;
  background:linear-gradient(135deg, var(--gold) 0%, #b8922a 100%);
  color:#0a0800;border:none;border-radius:11px;padding:13px 0;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  cursor:pointer;display:none;letter-spacing:.05em;
  box-shadow:0 4px 16px rgba(201,168,76,.2);
  transition:transform .15s, box-shadow .15s;
}
.next-btn:active{transform:scale(.98);}
.next-btn.show{display:block;}
.flag-btn {
  background:var(--card);border:1px solid var(--border);border-radius:11px;
  padding:13px 14px;color:var(--text3);font-size:14px;cursor:pointer;
  display:none;transition:all .2s;
}
.flag-btn.show{display:block;}
.flag-btn.flagged{color:var(--orange);border-color:rgba(251,146,60,.4);}

/* ── SCORE SCREEN ── */
.score-wrap{text-align:center;padding:24px 0 16px;animation:fadeUp .4s ease;}
.score-big{font-size:52px;margin-bottom:10px;}
.score-heading{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold2);font-style:italic;margin-bottom:6px;}
.score-sub{color:var(--text3);font-size:13px;margin-bottom:20px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;}
.sc-val{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:3px;}
.sc-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.score-actions{display:flex;flex-direction:column;gap:8px;}
.score-btn {
  width:100%;padding:13px;border-radius:11px;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  cursor:pointer;letter-spacing:.05em;transition:all .2s;border:none;
}
.score-btn.primary{background:linear-gradient(135deg, var(--gold), #b8922a);color:#0a0800;box-shadow:0 4px 16px rgba(201,168,76,.2);}
.score-btn.secondary{background:var(--card);border:1px solid var(--border);color:var(--text2);}
.score-btn.tertiary{background:linear-gradient(135deg,rgba(74,158,255,.12),rgba(74,158,255,.04));border:1px solid rgba(74,158,255,.25);color:var(--blue2);}

/* ── AI ── */
.ai-section{padding:0 16px 28px;display:none;flex-direction:column;gap:10px;}
.ai-section.visible{display:flex;}
.ai-divider{border:none;border-top:1px solid rgba(201,168,76,.1);margin-bottom:6px;}
.ai-resp {
  background:linear-gradient(135deg, var(--card2), var(--card));
  border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;font-size:14.5px;line-height:1.75;display:none;
}
.ai-resp.show{display:block;animation:fadeUp .3s ease;}
.ai-lbl{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--blue2);margin-bottom:10px;}
.ai-row{display:flex;gap:8px;}
.ai-input {
  flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;outline:none;
  transition:border-color .2s;
}
.ai-input:focus{border-color:rgba(74,158,255,.4);}
.ai-input::placeholder{color:var(--text3);}
.ai-btn {
  background:linear-gradient(135deg, var(--blue) 0%, #2563eb 100%);
  border:none;border-radius:10px;padding:12px 16px;
  color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:opacity .2s;
}
.ai-btn:disabled{opacity:.4;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--blue2);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── TOAST ── */
.toast {
  position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;
  z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>

<!-- HEADER -->
<div class="header">
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  <div class="logo-wrap">
    <div class="logo-main">Grammar Lab</div>
    <div class="logo-sub">A1 → C2</div>
  </div>
  <div class="header-right">
    <div class="hud-pill streak">🔥 <span id="streakVal">0</span></div>
    <div class="hud-pill xp">⭐ <span id="xpVal">0</span></div>
