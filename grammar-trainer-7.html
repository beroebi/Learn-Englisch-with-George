// STATE & STORAGE
// ═══════════════════════════════════════════════════
const SKEY = 'grammarlab_v4';
function loadState(){try{const r=localStorage.getItem(SKEY);return r?JSON.parse(r):defaultState();}catch(e){return defaultState();}}
function defaultState(){return{xp:0,streak:0,lastDate:null,progress:{},reviewQueue:[],flagged:{},lastTopic:null};}
function saveState(){try{localStorage.setItem(SKEY,JSON.stringify(ST));}catch(e){}}
function getTP(id){if(!ST.progress[id])ST.progress[id]={correct:[],wrong:[],lastQ:0};return ST.progress[id];}

let ST = loadState();

function updateStreak(){
  const today=new Date().toDateString();
  if(ST.lastDate===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  ST.streak=ST.lastDate===yesterday?ST.streak+1:1;
  ST.lastDate=today;saveState();
}
function addXP(n){ST.xp+=n;saveState();updateHUD();}
function updateHUD(){document.getElementById('streakVal').textContent=ST.streak;document.getElementById('xpVal').textContent=ST.xp;}
function isUnlocked(lk){return ST.xp>=LEVELS[lk].minXP;}
function getLevelPct(lk){
  const ts=TOPICS.filter(t=>t.level===lk);
  if(!ts.length)return 0;
  let tot=0,cor=0;
  ts.forEach(t=>{tot+=t.quiz.length;cor+=(getTP(t.id).correct||[]).length;});
  return tot?Math.round((cor/tot)*100):0;
}
function getDue(){return ST.reviewQueue.filter(r=>r.due<=Date.now());}

// ═══════════════════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════════════════
function buildDrawer(){
  const order=['A1','A2','B1','B2','C1','C2'];
  let h='';
  order.forEach(lk=>{
    const lv=LEVELS[lk],unlocked=isUnlocked(lk),pct=getLevelPct(lk);
    const ts=TOPICS.filter(t=>t.level===lk);
    h+=`<div class="level-section">
      <div class="level-head">
        <div class="level-pip" style="background:${lv.color}"></div>
        <span class="level-lbl" style="color:${lv.color}">${lv.label}</span>
        <span class="level-lock-txt">${!unlocked?'🔒 '+lv.minXP+'⭐':pct+'%'}</span>
      </div>
      <div class="level-bar-wrap"><div class="level-bar-fill" style="width:${unlocked?pct:0}%;background:${lv.color}"></div></div>
      <div>`;
    ts.forEach(t=>{
      const p=getTP(t.id),done=(p.correct||[]).length,pctT=Math.round((done/t.quiz.length)*100);
      const isBookmark=ST.lastTopic===t.id;
      const due=getDue().filter(r=>r.topicId===t.id).length;
      h+=`<button class="t-btn${currentTopic===t.id?' active':''}${!unlocked?' locked':''}" onclick="loadTopic('${t.id}',this)">
        <span class="t-icon">${t.icon}</span>
        <span class="t-name">${t.title}</span>
        ${isBookmark?'<span class="t-badge bookmark">📍</span>':''}
        ${due>0?`<span class="t-badge review">↻${due}</span>`:''}
        <span class="t-pct">${pctT}%</span>
      </button>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('drawerBody').innerHTML=h;
}
function toggleDrawer(){buildDrawer();const d=document.getElementById('drawer'),o=document.getElementById('overlay'),open=d.classList.contains('open');d.classList.toggle('open',!open);o.classList.toggle('open',!open);}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function showDashboard(){
  document.getElementById('modeBar').classList.remove('visible');
  document.getElementById('aiSection').classList.remove('visible');
  const due=getDue();
  const order=['A1','A2','B1','B2','C1','C2'];
  let levRows='';
  order.forEach(lk=>{
    const lv=LEVELS[lk],unlocked=isUnlocked(lk),pct=getLevelPct(lk);
    levRows+=`<div class="level-row" onclick="openFirstTopic('${lk}')">
      <div class="level-row-dot" style="background:${lv.color}"></div>
      <div class="level-row-info">
        <div class="level-row-name">${lv.label}${!unlocked?' 🔒':''}</div>
        <div class="level-row-bar"><div class="level-row-fill" style="width:${pct}%;background:${lv.color}"></div></div>
      </div>
      <div class="level-row-pct">${pct}%</div>
    </div>`;
  });
  const totalQ=TOPICS.reduce((s,t)=>s+t.quiz.length,0);
  const totalC=TOPICS.reduce((s,t)=>s+(getTP(t.id).correct||[]).length,0);
  const lastT=ST.lastTopic?TOPICS.find(x=>x.id===ST.lastTopic):null;

  document.getElementById('pane').innerHTML=`
    <div class="dash-hero">
      <div class="dash-greeting">Welcome back.</div>
      <div class="dash-sub">Your English grammar journey from A1 to C2.<br>Tap ☰ to choose a topic, or continue below.</div>
    </div>
    ${due.length>0?`<div class="review-alert" onclick="startReviewSession()">
      <div class="review-count">${due.length}</div>
      <div class="review-info">
        <div class="review-title">Reviews due</div>
        <div class="review-sub">${due.length} question${due.length>1?'s':''} ready for spaced repetition practice</div>
      </div>
    </div>`:''}
    ${lastT?`<button class="continue-btn" onclick="loadTopicById('${lastT.id}')">▶ Continue: ${lastT.icon} ${lastT.title}</button>`:''}
    <div class="dash-stats">
      <div class="stat-card"><div class="stat-val" style="color:var(--gold2)">${ST.xp}</div><div class="stat-lbl">Total XP</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--orange)">${ST.streak}</div><div class="stat-lbl">Streak 🔥</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${Math.round((totalC/totalQ)*100)}%</div><div class="stat-lbl">Overall</div></div>
    </div>
    <div class="dash-section-lbl">Progress by level</div>
    ${levRows}`;
}
function openFirstTopic(lk){
  if(!isUnlocked(lk)){showToast('🔒 Earn '+LEVELS[lk].minXP+'⭐ to unlock '+lk);return;}
  const t=TOPICS.find(x=>x.level===lk);if(t)loadTopicById(t.id);
}

// ═══════════════════════════════════════════════════
// TOPIC LOADING
// ═══════════════════════════════════════════════════
let currentTopic=null,currentMode='explain',currentQuiz=[],currentQ=0,score=0,answered=false,isReview=false;

function loadTopicById(id){const t=TOPICS.find(x=>x.id===id);if(t){const btn=document.querySelector(`.t-btn[onclick*="'${id}'"]`);loadTopic(id,btn);}}

function loadTopic(id,btn){
  const t=TOPICS.find(x=>x.id===id);
  if(!t||!isUnlocked(t.level)){showToast('🔒 Earn more XP to unlock this level');return;}
  currentTopic=id;isReview=false;ST.lastTopic=id;saveState();
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('modeBar').classList.add('visible');
  document.getElementById('aiSection').classList.add('visible');
  document.getElementById('aiResp').classList.remove('show');
  document.getElementById('btnExplain').classList.add('active');
  document.getElementById('btnQuiz').classList.remove('active');
  currentMode='explain';closeDrawer();renderExplain();window.scrollTo(0,0);
}
function switchMode(mode){
  currentMode=mode;
  document.getElementById('btnExplain').classList.toggle('active',mode==='explain');
  document.getElementById('btnQuiz').classList.toggle('active',mode==='quiz');
  if(mode==='explain')renderExplain();else renderQuiz();window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════
// EXPLAIN
// ═══════════════════════════════════════════════════
function renderExplain(){
  const t=TOPICS.find(x=>x.id===currentTopic);
  const lv=LEVELS[t.level];
  document.getElementById('pane').innerHTML=`
    <div class="topic-eyebrow">
      <span class="level-tag" style="background:${lv.color}18;color:${lv.color};border:1px solid ${lv.color}40">${t.level}</span>
      <span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px">${lv.label.split('·')[1]?.trim()}</span>
    </div>
    <div class="topic-title">${t.title}</div>
    <div class="topic-subtitle">Grammar Explanation</div>
    ${t.explain}
    <button onclick="switchMode('quiz')" style="width:100%;padding:13px;border-radius:11px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.3);color:var(--gold2);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:.05em;margin-top:6px;">
      ✏️ Start Exercises →
    </button>`;
}

// ═══════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════
function renderQuiz(){
  const t=TOPICS.find(x=>x.id===currentTopic);
  const p=getTP(currentTopic);
  const startQ=p.lastQ||0;
  currentQuiz=t.quiz.map((q,i)=>({...q,origIndex:i}));
  currentQuiz=[...currentQuiz.slice(startQ),...currentQuiz.slice(0,startQ)];
  currentQ=0;score=0;answered=false;renderQuestion();
}

function renderQuestion(){
  const t=TOPICS.find(x=>x.id===currentTopic);
  if(currentQ>=currentQuiz.length){renderScore();return;}
  answered=false;
  const q=currentQuiz[currentQ];
  const p=getTP(currentTopic);
  const isDue=getDue().some(r=>r.topicId===currentTopic&&r.qIndex===q.origIndex);
  const isFlagged=(ST.flagged[currentTopic]||[]).includes(q.origIndex);
  const lv=LEVELS[t.level];
  const L=['A','B','C','D'];
  document.getElementById('pane').innerHTML=`
    <div class="quiz-meta">
      <span class="q-pill main">${currentQ+1} / ${currentQuiz.length}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)">Score: ${score}</span>
      ${isDue?'<span class="q-pill review-p">↻ Review</span>':''}
      ${isFlagged?'<span class="q-pill flag-p">🚩</span>':''}
      <span class="level-tag" style="margin-left:auto;background:${lv.color}18;color:${lv.color};border:1px solid ${lv.color}40;font-family:JetBrains Mono,monospace;font-size:10px;padding:3px 9px;border-radius:20px;">${t.level}</span>
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="options">${q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answer(${i})"><span class="opt-letter">${L[i]}</span>${o}</button>`).join('')}</div>
    <div class="fb-box" id="fb"><div class="fb-title">✦ Explanation</div><div id="fbTxt"></div></div>
    <div class="btn-row">
      <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
      <button class="flag-btn${isFlagged?' flagged':''}" id="flagBtn" onclick="toggleFlag()">🚩</button>
    </div>`;
}

function answer(i){
  if(answered)return;answered=true;
  const q=currentQuiz[currentQ];const correct=i===q.ans;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.getElementById(`opt${i}`).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById(`opt${q.ans}`).classList.add('correct');
  const p=getTP(currentTopic);
  if(correct){score++;p.correct=p.correct||[];p.correct.push(q.origIndex);addXP(5);}
  else{p.wrong=p.wrong||[];p.wrong.push(q.origIndex);}
  const t=TOPICS.find(x=>x.id===currentTopic);
  p.lastQ=(q.origIndex+1)%t.quiz.length;saveState();
  // spaced repetition
  ST.reviewQueue=ST.reviewQueue.filter(r=>!(r.topicId===currentTopic&&r.qIndex===q.origIndex));
  const intervals=correct?[2,10,60,1440]:[1,5,15,60];
  const times=(p.correct||[]).filter(c=>c===q.origIndex).length;
  ST.reviewQueue.push({topicId:currentTopic,qIndex:q.origIndex,due:Date.now()+(intervals[Math.min(times,3)]||1440)*60000});
  saveState();
  document.getElementById('fbTxt').textContent=q.fb;
  document.getElementById('fb').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('flagBtn').classList.add('show');
  if(!correct)showToast('📚 Added to review queue');
}

function nextQ(){currentQ++;renderQuestion();window.scrollTo(0,0);}

function toggleFlag(){
  const q=currentQuiz[currentQ];
  if(!ST.flagged[currentTopic])ST.flagged[currentTopic]=[];
  const idx=ST.flagged[currentTopic].indexOf(q.origIndex);
  if(idx===-1){ST.flagged[currentTopic].push(q.origIndex);showToast('🚩 Question flagged');}
  else{ST.flagged[currentTopic].splice(idx,1);showToast('Flag removed');}
  saveState();
  const btn=document.getElementById('flagBtn');
  if(btn)btn.classList.toggle('flagged',ST.flagged[currentTopic].includes(q.origIndex));
}

// ═══════════════════════════════════════════════════
// SCORE + NEXT TOPIC BUTTON
// ═══════════════════════════════════════════════════
function renderScore(){
  const t=TOPICS.find(x=>x.id===currentTopic);
  const pct=Math.round((score/currentQuiz.length)*100);
  const emoji=pct===100?'🏆':pct>=70?'✅':pct>=40?'📈':'📚';
  const msg=pct===100?'Perfect score!':pct>=70?'Well done!':pct>=40?'Keep going!':'Keep practising!';
  const xpEarned=score*5;

  // Next topic
  const idx=TOPICS.findIndex(x=>x.id===currentTopic);
  const nextT=TOPICS[idx+1];
  const nextUnlocked=nextT&&isUnlocked(nextT.level);

  document.getElementById('pane').innerHTML=`
    <div class="score-wrap">
      <div class="score-big">${emoji}</div>
      <div class="score-heading">${msg}</div>
      <div class="score-sub">${score} / ${currentQuiz.length} correct &nbsp;·&nbsp; ${pct}% &nbsp;·&nbsp; +${xpEarned}⭐</div>
      <div class="score-grid">
        <div class="sc"><div class="sc-val" style="color:var(--green)">${score}</div><div class="sc-lbl">Correct</div></div>
        <div class="sc"><div class="sc-val" style="color:var(--red)">${currentQuiz.length-score}</div><div class="sc-lbl">Wrong</div></div>
        <div class="sc"><div class="sc-val" style="color:var(--gold2)">${ST.xp}</div><div class="sc-lbl">Total XP</div></div>
      </div>
      <div class="score-actions">
        ${nextT&&nextUnlocked?`<button class="score-btn primary" onclick="loadTopicById('${nextT.id}')">Next topic: ${nextT.icon} ${nextT.title} →</button>`:''}
        ${nextT&&!nextUnlocked?`<button class="score-btn tertiary" onclick="showToast('🔒 Earn ${LEVELS[nextT.level].minXP}⭐ to unlock ${nextT.level}')">Next: ${nextT.title} 🔒 ${LEVELS[nextT.level].minXP}⭐</button>`:''}
        <button class="score-btn secondary" onclick="switchMode('quiz')">↻ Try again</button>
        <button class="score-btn secondary" onclick="switchMode('explain')">📖 Review explanation</button>
        <button class="score-btn secondary" onclick="showDashboard()">🏠 Dashboard</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════
// REVIEW SESSION
// ═══════════════════════════════════════════════════
function startReviewSession(){
  const due=getDue();if(!due.length){showToast('No reviews due right now!');return;}
  const firstId=due[0].topicId;const t=TOPICS.find(x=>x.id===firstId);
  currentTopic=firstId;isReview=true;
  document.getElementById('modeBar').classList.add('visible');
  document.getElementById('aiSection').classList.add('visible');
  document.getElementById('btnExplain').classList.remove('active');
  document.getElementById('btnQuiz').classList.add('active');
  currentMode='quiz';
  const dueIdx=due.filter(r=>r.topicId===firstId).map(r=>r.qIndex);
  currentQuiz=t.quiz.map((q,i)=>({...q,origIndex:i})).filter(q=>dueIdx.includes(q.origIndex));
  currentQ=0;score=0;answered=false;
  closeDrawer();renderQuestion();window.scrollTo(0,0);
  showToast('🔁 Review session started');
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════
async function askAI(){
  const inp=document.getElementById('aiInput');const q=inp.value.trim();if(!q)return;
  const btn=document.getElementById('aiBtn');btn.disabled=true;
  const rd=document.getElementById('aiResp'),rt=document.getElementById('aiRespText');
  rd.classList.add('show');rt.innerHTML='<span class="spinner"></span><span style="color:var(--text3);font-style:italic">Thinking…</span>';
  const t=currentTopic?TOPICS.find(x=>x.id===currentTopic):null;
  const ctx=t?`The user is studying: ${t.title} (Level ${t.level}).`:'';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are a concise English grammar tutor for a German-speaking learner. ${ctx} Answer clearly with rules and examples. Use ✓ for correct and ✗ for incorrect examples. Compare to German when helpful. Max 200 words.`,messages:[{role:'user',content:q}]})});
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('')||'No response.';
    rt.innerHTML=text.replace(/\n/g,'<br>').replace(/✓/g,'<span style="color:var(--green)">✓</span>').replace(/✗/g,'<span style="color:var(--red)">✗</span>');
  }catch(e){rt.innerHTML='<span style="color:var(--red)">Connection error. Please try again.</span>';}
  inp.value='';btn.disabled=false;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
updateStreak();updateHUD();showDashboard();
</script>
</body>
</html>
