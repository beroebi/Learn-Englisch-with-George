ply. _____, the government increased spending.","opts":["Moreover","Albeit","Nevertheless","Therefore"],"ans":2,"fb":"\"Nevertheless\" = despite this. Government increased spending even though economy contracted."},{"q":"The proposal is bold _____ somewhat unrealistic.","opts":["whereas","although","albeit","despite"],"ans":2,"fb":"\"Albeit\" = even though (formal). Used before an adjective or short phrase."},{"q":"Costs were reduced by 20%. _____, output actually increased.","opts":["Nevertheless","Moreover","Albeit","Hence"],"ans":1,"fb":"\"Moreover\" adds a further positive point to what was already positive."},{"q":"The northern regions saw growth _____ the south continued to stagnate.","opts":["moreover","nevertheless","whereas","hence"],"ans":2,"fb":"\"Whereas\" draws a direct contrast between two comparable subjects."},{"q":"The firm restructured its debt, _____ avoiding insolvency.","opts":["hence","thus","thereby","therefore"],"ans":2,"fb":"\"Thereby + -ing\" = by doing so / as a direct result."},{"q":"Granted, there are risks; _____, the potential rewards are significant.","opts":["therefore","albeit","nevertheless","whereas"],"ans":2,"fb":"\"Granted... nevertheless\" — classic concession pattern."},{"q":"The data was incomplete and, _____, the conclusions remain tentative.","opts":["moreover","furthermore","hence","thereby"],"ans":2,"fb":"\"Hence\" = therefore / as a result. Placed mid-sentence with commas."},{"q":"The project was completed on time, _____ under considerable pressure.","opts":["whereas","albeit","furthermore","nevertheless"],"ans":1,"fb":"\"Albeit\" before a phrase: \"completed on time, albeit under pressure.\""}]}];
var SKEY='grammarlab_v6';

function answer(i){if(answered)return;answered=true;var q=currentQuiz[currentQ],correct=i===q.ans;document.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});document.getElementById('opt'+i).classList.add(correct?'correct':'wrong');if(!correct)document.getElementById('opt'+q.ans).classList.add('correct');var p=getTP(currentTopic);if(correct){score++;p.correct=p.correct||[];p.correct.push(q.origIndex);addXP(5);}else{p.wrong=p.wrong||[];p.wrong.push(q.origIndex);}var t=TOPICS.find(function(x){return x.id===currentTopic;});p.lastQ=(q.origIndex+1)%t.quiz.length;saveState();ST.reviewQueue=ST.reviewQueue.filter(function(r){return!(r.topicId===currentTopic&&r.qIndex===q.origIndex);});var intervals=correct?[2,10,60,1440]:[1,5,15,60],times=(p.correct||[]).filter(function(c){return c===q.origIndex;}).length;ST.reviewQueue.push({topicId:currentTopic,qIndex:q.origIndex,due:Date.now()+(intervals[Math.min(times,3)]||1440)*60000});saveState();document.getElementById('fbTxt').textContent=q.fb;document.getElementById('fb').classList.add('show');document.getElementById('nextBtn').classList.add('show');document.getElementById('flagBtn').classList.add('show');if(!correct)showToast('Added to review queue');}

function startReviewSession(){var due=getDue();if(!due.length){showToast('No reviews due!');return;}var firstId=due[0].topicId,t=TOPICS.find(function(x){return x.id===firstId;});currentTopic=firstId;document.getElementById('modeBar').classList.add('visible');document.getElementById('aiSection').classList.add('visible');currentMode='quiz';var dueIdx=due.filter(function(r){return r.topicId===firstId;}).map(function(r){return r.qIndex;});currentQuiz=t.quiz.map(function(q,i){return Object.assign({},q,{origIndex:i});}).filter(function(q){return dueIdx.includes(q.origIndex);});currentQ=0;score=0;answered=false;closeDrawer();renderQuestion();window.scrollTo(0,0);showToast('Review session started');}
var toastTimer=null;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},2500);}
function askAI(){var inp=document.getElementById('aiInput'),q=inp.value.trim();if(!q)return;var btn=document.getElementById('aiBtn');btn.disabled=true;var rd=document.getElementById('aiResp'),rt=document.getElementById('aiRespText');rd.classList.add('show');rt.innerHTML='<span class="spinner"></span><span style="color:#64748b;font-style:italic">Thinking...</span>';var t=currentTopic?TOPICS.find(function(x){return x.id===currentTopic;}):null,ctx=t?'The user is studying: '+t.title+' (Level '+t.level+').':'';fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are a concise English grammar tutor for a German-speaking learner. '+ctx+' Answer with clear rules and examples. Use check mark for correct and X for incorrect. Compare to German when helpful. Max 200 words.',messages:[{role:'user',content:q}]})}).then(function(res){return res.json();}).then(function(data){rt.innerHTML=(data.content||[]).map(function(c){return c.text||'';}).join('').replace(/\n/g,'<br>');}).catch(function(){rt.innerHTML='<span style="color:#ff5c5c">Connection error. This feature requires the app to be hosted online (e.g. GitHub Pages).</span>';});inp.value='';btn.disabled=false;}
