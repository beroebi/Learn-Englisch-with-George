<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Grammar Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0e;--sur:#111318;--card:#161a22;--card2:#1c2130;--bdr:#252b38;--bdr2:#2e3647;--gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e0a0;--blu:#4a9eff;--blu2:#7ab8e8;--grn:#4ecb71;--red:#ff5c5c;--pur:#a78bfa;--org:#fb923c;--tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Crimson Pro',Georgia,serif;font-size:16px;overscroll-behavior:none;}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(201,168,76,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(74,158,255,.04) 0%,transparent 60%);}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(201,168,76,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.025) 1px,transparent 1px);background-size:40px 40px;}
.header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(8,10,14,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.12);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;}
.menu-btn{background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;padding:8px;line-height:1;border-radius:8px;}
.logo-wrap{display:flex;flex-direction:column;line-height:1;}
.logo-main{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold2);font-weight:600;}
.logo-sub{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--tx3);font-family:'JetBrains Mono',monospace;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.hud-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.hud-pill.streak{color:var(--org);}
.hud-pill.xp{color:var(--gold2);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:88vw;max-width:320px;background:linear-gradient(160deg,#0f1219 0%,#0b0e15 100%);border-right:1px solid rgba(201,168,76,.12);z-index:300;transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-top{padding:20px 16px 16px;border-bottom:1px solid rgba(201,168,76,.1);background:linear-gradient(135deg,rgba(201,168,76,.06) 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;}
.drawer-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold2);}
.drawer-close{background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer;padding:6px;}
.drawer-body{flex:1;padding:10px 10px 60px;}
.lv-sec{margin-bottom:4px;}
.lv-head{display:flex;align-items:center;gap:8px;padding:10px 10px 5px;}
.lv-pip{width:8px;height:8px;border-radius:50%;}
.lv-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;}
.lv-pct{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);}
.lv-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin:0 10px 6px;overflow:hidden;}
.lv-fill{height:100%;border-radius:1px;transition:width .5s;}
.t-btn{background:none;border:none;color:var(--tx2);font-family:'Crimson Pro',serif;font-size:14px;padding:9px 12px;border-radius:9px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;width:100%;}
.t-btn.active{background:linear-gradient(90deg,rgba(201,168,76,.12),rgba(201,168,76,.04));color:var(--gold2);border-left:2px solid var(--gold);}
.t-icon{width:18px;flex-shrink:0;font-size:13px;}
.t-name{flex:1;}
.t-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);}
.main{margin-top:56px;margin-bottom:66px;position:relative;z-index:1;}
.pane{padding:20px 16px 28px;}
.dash-hero{background:linear-gradient(135deg,rgba(201,168,76,.1) 0%,rgba(74,158,255,.05) 100%);border:1px solid rgba(201,168,76,.15);border-radius:18px;padding:20px;margin-bottom:18px;position:relative;overflow:hidden;}
.dash-greeting{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold2);margin-bottom:4px;font-style:italic;}
.dash-sub{color:var(--tx3);font-size:13.5px;line-height:1.5;}
.dash-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:3px;}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);}
.cont-btn{width:100%;background:linear-gradient(135deg,var(--gold) 0%,#b8922a 100%);color:#0a0800;border:none;border-radius:12px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 20px rgba(201,168,76,.25);letter-spacing:.05em;}
.rev-alert{background:linear-gradient(135deg,rgba(255,92,92,.08),rgba(255,92,92,.03));border:1px solid rgba(255,92,92,.25);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.rev-cnt{font-family:'Playfair Display',serif;font-size:28px;color:var(--red);min-width:40px;}
.rev-info{flex:1;}
.rev-title{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.rev-sub{font-size:12.5px;color:var(--tx3);}
.dash-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;padding-left:2px;}
.lv-row{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.lv-row-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.lv-row-info{flex:1;}
.lv-row-name{font-size:14px;margin-bottom:5px;color:var(--tx);}
.lv-row-bar{height:3px;background:var(--bdr);border-radius:2px;overflow:hidden;}
.lv-row-fill{height:100%;border-radius:2px;}
.lv-row-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);}
.mode-bar{position:fixed;bottom:0;left:0;right:0;height:66px;background:rgba(8,10,14,.9);backdrop-filter:blur(20px);border-top:1px solid rgba(201,168,76,.1);display:none;align-items:center;justify-content:center;gap:8px;padding:0 16px;z-index:100;}
.mode-bar.visible{display:flex;}
.mode-btn{flex:1;max-width:170px;padding:10px 0;border-radius:10px;border:1px solid var(--bdr);background:none;color:var(--tx3);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;}
.mode-btn.active{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));border-color:rgba(201,168,76,.4);color:var(--gold2);}
.topic-eye{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.lv-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;letter-spacing:.05em;}
.topic-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold2);line-height:1.2;margin-bottom:6px;font-style:italic;}
.topic-sub{color:var(--tx3);font-size:13px;letter-spacing:.05em;font-family:'JetBrains Mono',monospace;margin-bottom:20px;}
.eb{background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:14px;line-height:1.8;font-size:15px;position:relative;overflow:hidden;}
.eb::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent);}
.bl{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.15em;color:var(--blu2);margin-bottom:12px;}
.formula{background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--gold3);margin:12px 0;line-height:1.6;}
.ex{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14.5px;line-height:1.55;align-items:baseline;}
.ex:last-child{border:none;}
.et{font-family:'JetBrains Mono',monospace;font-size:9.5px;min-width:28px;color:var(--tx3);padding-top:3px;flex-shrink:0;}
.ec{color:var(--grn);}
.ew{color:var(--red);text-decoration:line-through;opacity:.7;}
.en{color:var(--tx);}
em{color:var(--gold2);font-style:normal;font-weight:600;}
.tb{background:linear-gradient(135deg,rgba(167,139,250,.06) 0%,rgba(167,139,250,.02) 100%);border:1px solid rgba(167,139,250,.2);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.7;}
.tl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--pur);text-transform:uppercase;margin-bottom:8px;}
.wb{background:rgba(255,92,92,.05);border:1px solid rgba(255,92,92,.2);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.7;}
.wl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--red);text-transform:uppercase;margin-bottom:8px;}
.start-btn{width:100%;padding:13px;border-radius:11px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.3);color:var(--gold2);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:.05em;margin-top:6px;}
.quiz-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.q-pill{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);}
.q-pill.main{color:var(--gold2);border-color:rgba(201,168,76,.3);}
.q-pill.rev{color:var(--red);background:rgba(255,92,92,.08);border-color:rgba(255,92,92,.3);}
.quiz-q{font-family:'Playfair Display',serif;font-size:19px;line-height:1.55;color:var(--tx);margin-bottom:18px;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 15px;color:var(--tx2);font-family:'Crimson Pro',serif;font-size:15.5px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:12px;line-height:1.45;width:100%;}
.opt.correct{border-color:var(--grn);color:var(--grn);background:rgba(78,203,113,.07);}
.opt.wrong{border-color:var(--red);color:var(--red);background:rgba(255,92,92,.07);}
.opt-l{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;color:var(--tx3);}
.fb-box{background:linear-gradient(135deg,rgba(74,158,255,.06),rgba(74,158,255,.02));border:1px solid rgba(74,158,255,.2);border-radius:12px;padding:14px 16px;margin-top:14px;font-size:14.5px;line-height:1.7;color:var(--tx2);display:none;}
.fb-box.show{display:block;}
.fb-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--blu2);margin-bottom:8px;}
.btn-row{display:flex;gap:8px;margin-top:14px;}
.next-btn{flex:1;background:linear-gradient(135deg,var(--gold) 0%,#b8922a 100%);color:#0a0800;border:none;border-radius:11px;padding:13px 0;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;display:none;letter-spacing:.05em;box-shadow:0 4px 16px rgba(201,168,76,.2);}
.next-btn.show{display:block;}
.flag-btn{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:13px 14px;color:var(--tx3);font-size:14px;cursor:pointer;display:none;}
.flag-btn.show{display:block;}
.flag-btn.flagged{color:var(--org);border-color:rgba(251,146,60,.4);}
.score-wrap{text-align:center;padding:24px 0 16px;}
.score-big{font-size:52px;margin-bottom:10px;}
.score-heading{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold2);font-style:italic;margin-bottom:6px;}
.score-sub{color:var(--tx3);font-size:13px;margin-bottom:20px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 8px;text-align:center;}
.sc-val{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:3px;}
.sc-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);}
.score-actions{display:flex;flex-direction:column;gap:8px;}
.score-btn{width:100%;padding:13px;border-radius:11px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.05em;border:none;}
.score-btn.primary{background:linear-gradient(135deg,var(--gold),#b8922a);color:#0a0800;box-shadow:0 4px 16px rgba(201,168,76,.2);}
.score-btn.secondary{background:var(--card);border:1px solid var(--bdr);color:var(--tx2);}
.ai-section{padding:0 16px 28px;display:none;flex-direction:column;gap:10px;}
.ai-section.visible{display:flex;}
.ai-divider{border:none;border-top:1px solid rgba(201,168,76,.1);margin-bottom:6px;}
.ai-resp{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;font-size:14.5px;line-height:1.7;display:none;}
.ai-resp.show{display:block;}
.ai-lbl{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--blu2);margin-bottom:10px;}
.ai-row{display:flex;gap:8px;}
.ai-input{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;color:var(--tx);font-family:'Crimson Pro',serif;font-size:15px;outline:none;}
.ai-input:focus{border-color:rgba(74,158,255,.4);}
.ai-input::placeholder{color:var(--tx3);}
.ai-btn{background:linear-gradient(135deg,var(--blu) 0%,#2563eb 100%);border:none;border-radius:10px;padding:12px 16px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.ai-btn:disabled{opacity:.4;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--blu2);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--card2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="header">
  <button class="menu-btn" onclick="toggleDrawer()">&#9776;</button>
  <div class="logo-wrap">
    <div class="logo-main">Grammar Lab</div>
    <div class="logo-sub">A1 &rarr; C2 &middot; All Levels</div>
  </div>
  <div class="header-right">
    <div class="hud-pill streak">&#128293; <span id="streakVal">0</span></div>
    <div class="hud-pill xp">&#11088; <span id="xpVal">0</span></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-top">
    <div class="drawer-title">All Topics</div>
    <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>
<div class="main">
  <div class="pane" id="pane"></div>
  <div class="ai-section" id="aiSection">
    <hr class="ai-divider">
    <div class="ai-resp" id="aiResp">
      <div class="ai-lbl">&#10022; AI Tutor</div>
      <div id="aiRespText"></div>
    </div>
    <div class="ai-row">
      <input class="ai-input" id="aiInput" placeholder="Ask a grammar question..." onkeydown="if(event.key==='Enter')askAI()">
      <button class="ai-btn" id="aiBtn" onclick="askAI()">Ask</button>
    </div>
  </div>
</div>
<div class="mode-bar" id="modeBar">
  <button class="mode-btn active" id="btnExplain" onclick="switchMode('explain')">&#128214; Explanation</button>
  <button class="mode-btn" id="btnQuiz" onclick="switchMode('quiz')">&#9999;&#65039; Exercises</button>
</div>
<div class="toast" id="toast"></div>
<script>
var LEVELS={A1:{color:'#4ecb71',label:'A1 - Beginner'},A2:{color:'#38bdf8',label:'A2 - Elementary'},B1:{color:'#fbbf24',label:'B1 - Intermediate'},B2:{color:'#fb923c',label:'B2 - Upper-Intermediate'},C1:{color:'#f87171',label:'C1 - Advanced'},C2:{color:'#a78bfa',label:'C2 - Mastery'}};
var TOPICS=[{"id":"a1_be","level":"A1","icon":"🔵","title":"To Be: am / is / are","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EForms\u003C/div\u003EThe verb \u003Cem\u003Eto be\u003C/em\u003E changes with every subject.\u003Cdiv class=\"formula\"\u003EI am \u0026nbsp;·\u0026nbsp; You are \u0026nbsp;·\u0026nbsp; He/She/It is \u0026nbsp;·\u0026nbsp; We/They are\u003C/div\u003EContractions: I'm · You're · He's · We're · They're\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ENegative \u0026amp; Questions\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Eneg\u003C/span\u003E\u003Cspan class=\"en\"\u003EI \u003Cem\u003Eam not\u003C/em\u003E (I'm not) / She \u003Cem\u003Eisn't\u003C/em\u003E / They \u003Cem\u003Earen't\u003C/em\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EQ\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EIs\u003C/em\u003E she ready? / \u003Cem\u003EAre\u003C/em\u003E you tired? / \u003Cem\u003EAm\u003C/em\u003E I late?\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"tb\"\u003E\u003Cdiv class=\"tl\"\u003E🇩🇪 German\u003C/div\u003E\"Ich bin\" = I am · \"Er ist\" = He is · \"Sie sind\" = They are. Same logic as German \"sein\" — verb agrees with subject.\u003C/div\u003E","quiz":[{"q":"My parents _____ both teachers.","opts":["is","am","are","be"],"ans":2,"fb":"Parents = plural → \"are\". I am, you/we/they are, he/she/it is."},{"q":"_____ the exam difficult?","opts":["Am","Are","Is","Be"],"ans":2,"fb":"\"The exam\" = singular (it) → \"Is the exam difficult?\""},{"q":"I _____ not sure about this.","opts":["is","are","am","be"],"ans":2,"fb":"\"I\" always goes with \"am\". Negative: \"I am not\" or \"I'm not\"."},{"q":"Where _____ you from?","opts":["is","am","be","are"],"ans":3,"fb":"Questions with \"you\" → \"Are you...?\""},{"q":"The office _____ on the second floor.","opts":["am","are","is","be"],"ans":2,"fb":"\"The office\" = singular (it) → \"is on the second floor\"."},{"q":"We _____ very tired after the flight.","opts":["is","am","are","be"],"ans":2,"fb":"\"We\" → \"are\". We are very tired."},{"q":"_____ he the new manager?","opts":["Are","Am","Be","Is"],"ans":3,"fb":"\"He\" = third person singular → \"Is he the new manager?\""},{"q":"The results _____ not ready yet.","opts":["is","am","are","be"],"ans":2,"fb":"\"Results\" = plural → \"are not ready yet\"."}]},{"id":"a1_present_simple","level":"A1","icon":"⏰","title":"Present Simple","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EUsage\u003C/div\u003EFor habits, routines, facts — not for right now.\u003Cdiv class=\"formula\"\u003EI/You/We/They + verb \u0026nbsp;|\u0026nbsp; He/She/It + verb+s/es\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EHe/She/It spelling\u003C/div\u003EMost verbs + s: works, plays. Ending -ch/-sh/-x/-o/-s + es: watches, goes. Consonant + y → ies: studies.\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EShe studys / He go / It watchs\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EShe studies / He goes / It watches\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ENegatives \u0026amp; Questions\u003C/div\u003E\u003Cdiv class=\"formula\"\u003ENeg: don't / doesn't + base verb\u003Cbr\u003EQ: Do/Does + subject + base verb?\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EDoes she works here?\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EDoes she work here?\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"tb\"\u003E\u003Cdiv class=\"tl\"\u003E🇩🇪 German\u003C/div\u003EGerman uses one tense for both \"he works\" and \"he is working\". English splits these into two separate tenses.\u003C/div\u003E","quiz":[{"q":"He _____ the 7 AM train every day.","opts":["catch","catches","catchs","cetchs"],"ans":1,"fb":"\"Catch\" ends in -ch → add -es: catches."},{"q":"_____ your sister speak French?","opts":["Does","Do","Is","Are"],"ans":0,"fb":"\"Sister\" = she → \"Does she...?\" Use \"does\" for he/she/it."},{"q":"The bank _____ not open on Sundays.","opts":["do","is","does","are"],"ans":2,"fb":"\"The bank\" = it → \"does not open\". Base verb stays as \"open\"."},{"q":"They _____ every evening.","opts":["studys","studies","study","studyes"],"ans":2,"fb":"\"They\" → base verb, no -s: \"study\". The -ies ending is only for he/she/it."},{"q":"Water _____ at 100 degrees.","opts":["freeze","freezes","is freezing","froze"],"ans":1,"fb":"Scientific fact → Present Simple. \"Water\" = it → \"freezes\"."},{"q":"_____ they live near the office?","opts":["Does","Is","Do","Are"],"ans":2,"fb":"\"They\" is plural → \"Do they live?\" \"Does\" is only for he/she/it."},{"q":"She _____ not enjoy loud music.","opts":["don't enjoy","doesn't enjoys","isn't enjoy","doesn't enjoy"],"ans":3,"fb":"She → \"doesn't\" + base verb: \"doesn't enjoy\". Never \"doesn't enjoys\"."},{"q":"My dog _____ twelve hours a day.","opts":["sleep","is sleeping","sleeping","sleeps"],"ans":3,"fb":"\"My dog\" = it → \"sleeps\". Habit/fact → Present Simple."}]},{"id":"a1_articles","level":"A1","icon":"📰","title":"Articles: a / an / the","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003Ea / an — Indefinite\u003C/div\u003EUse before singular countable nouns — first mention or one of many.\u003Cdiv class=\"formula\"\u003Ea + consonant sound: a book · a university · a one-way street\u003Cbr\u003Ean + vowel sound: an apple · an hour · an MBA · an honest man\u003C/div\u003EThe rule is about \u003Cem\u003Esound\u003C/em\u003E, not spelling!\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003Ethe — Definite\u003C/div\u003EUse when both speaker and listener know exactly which one.\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI met \u003Cem\u003Ea\u003C/em\u003E client. \u003Cem\u003EThe\u003C/em\u003E client was very demanding. (2nd mention)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EThe\u003C/em\u003E sun · the Bundesbank · the internet (unique — only one exists)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ENo article (zero article)\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI love — coffee. (uncountable, general)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E— Cats are independent. (plural, general)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EShe studied — law. (subject/institution, general use)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"She is _____ engineer at a large firm.","opts":["a","an","the","—"],"ans":1,"fb":"\"Engineer\" starts with vowel sound /ɛ/ → \"an engineer\"."},{"q":"He works at _____ European Central Bank.","opts":["a","an","the","—"],"ans":2,"fb":"Specific unique institution → \"the\". Note: \"European\" starts with /j/ sound → \"a European\"."},{"q":"I need _____ advice about my contract.","opts":["a","an","the","—"],"ans":3,"fb":"\"Advice\" is uncountable → no article in general use."},{"q":"Can I have _____ glass of water, please?","opts":["—","an","a","the"],"ans":2,"fb":"\"Glass\" is singular countable, first mention → \"a glass\"."},{"q":"_____ Rhine runs through Frankfurt.","opts":["A","An","The","—"],"ans":2,"fb":"Named rivers always take \"the\": the Rhine, the Thames, the Amazon."},{"q":"It was _____ interesting meeting.","opts":["a","an","the","—"],"ans":1,"fb":"\"Interesting\" starts with vowel sound /ɪ/ → \"an interesting meeting\"."},{"q":"I love _____ Italian food.","opts":["the","a","an","—"],"ans":3,"fb":"General category → no article. \"I love the Italian food here\" refers to a specific place."},{"q":"I need _____ hour to finish this.","opts":["a","an","the","—"],"ans":1,"fb":"\"Hour\" has a silent H — starts with vowel sound /aʊ/ → \"an hour\"."}]},{"id":"a2_past_simple","level":"A2","icon":"⏪","title":"Past Simple","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EUsage\u003C/div\u003ECompleted actions at a specific time in the past. Signal words: yesterday, last week, in 2020, ago, when.\u003Cdiv class=\"formula\"\u003ERegular: verb + ed (worked, played)\u003Cbr\u003EIrregular: must be memorised (go→went, come→came, see→saw)\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EKey irregular verbs\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003Etake→took · make→made · buy→bought · think→thought\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003Eknow→knew · write→wrote · speak→spoke · give→gave\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003Ebegin→began · break→broke · choose→chose · lose→lost\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EQuestions \u0026amp; Negatives\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EQ: Did + subject + base verb?\u003Cbr\u003ENeg: didn't + base verb\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EDid she went? / She didn't went.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EDid she go? / She didn't go.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"tb\"\u003E\u003Cdiv class=\"tl\"\u003E🇩🇪 German\u003C/div\u003EIn English, specific past time (yesterday, in 2020) always requires Past Simple — never Present Perfect. \"Ich habe es gestern gemacht\" → \"I did it yesterday\" (NOT \"I have done it yesterday\").\u003C/div\u003E","quiz":[{"q":"She _____ the red one in the end.","opts":["choosed","chose","has chosen","chosed"],"ans":1,"fb":"\"Choose\" is irregular: choose → chose."},{"q":"_____ they finish the project on time?","opts":["Did / finished","Did / finish","Have / finished","Do / finish"],"ans":1,"fb":"Past Simple question: Did + subject + base verb. \"Finish\" stays as base form after \"did\"."},{"q":"We _____ about the regulation change.","opts":["didn't knew","don't know","didn't know","not knew"],"ans":2,"fb":"Past Simple negative: didn't + base verb. \"Know\" stays as base form after \"didn't\"."},{"q":"The meeting _____ late because of traffic.","opts":["beginned","begun","began","has begun"],"ans":2,"fb":"\"Begin\" is irregular: begin → began (past simple)."},{"q":"I _____ my phone on the train yesterday.","opts":["have lost","losed","lost","lose"],"ans":2,"fb":"\"Lose\" is irregular: lose → lost. \"Yesterday\" = specific past → Past Simple."},{"q":"He _____ to the client for over an hour.","opts":["speaked","spoken","has spoken","spoke"],"ans":3,"fb":"\"Speak\" is irregular: speak → spoke (past simple)."},{"q":"When _____ this report written?","opts":["have you","did you","was","were"],"ans":2,"fb":"Passive Past Simple question → \"was\" + past participle. \"When was this report written?\""},{"q":"We _____ a great time at the conference.","opts":["had","have","haved","has"],"ans":0,"fb":"\"Have\" is irregular: have → had. Same form for all persons."}]},{"id":"a2_prepositions","level":"A2","icon":"📅","title":"Prepositions of Time and Place","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ETime\u003C/div\u003E\u003Cdiv class=\"formula\"\u003Eat → precise time: at 9 AM · at noon · at Christmas\u003Cbr\u003Eon → days/dates: on Monday · on 15 April · on my birthday\u003Cbr\u003Ein → longer periods: in April · in 2024 · in the morning · in winter\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E💡\u003C/span\u003E\u003Cspan class=\"en\"\u003ENo preposition: last/next/this/every → last week, next Monday\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E💡\u003C/span\u003E\u003Cspan class=\"en\"\u003ESpecial: \u003Cem\u003Eat\u003C/em\u003E night (not \"in the night\")\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EPlace\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Eat\u003C/span\u003E\u003Cspan class=\"en\"\u003Especific point: at the office · at the station · at home\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Ein\u003C/span\u003E\u003Cspan class=\"en\"\u003Eenclosed space: in Frankfurt · in the room · in the car\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Eon\u003C/span\u003E\u003Cspan class=\"en\"\u003Esurface/level: on the desk · on the second floor · on the left\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"The flight departs _____ 6:45 AM.","opts":["on","in","at","by"],"ans":2,"fb":"Precise time → \"at\". At 6:45 AM."},{"q":"She was born _____ a Friday _____ March.","opts":["on / in","in / on","at / in","on / at"],"ans":0,"fb":"Day → \"on a Friday\". Month → \"in March\"."},{"q":"I'll see you _____ the evening.","opts":["at","on","in","by"],"ans":2,"fb":"\"In the evening\" — but note the exception: \"at night\"."},{"q":"The documents are _____ the top drawer.","opts":["at","in","on","between"],"ans":1,"fb":"\"In the drawer\" — drawers are enclosed spaces → \"in\"."},{"q":"The presentation is _____ Thursday _____ 2 PM.","opts":["on / at","at / on","in / at","on / in"],"ans":0,"fb":"Day → \"on Thursday\". Precise time → \"at 2 PM\"."},{"q":"She works _____ the fourth floor.","opts":["at","in","on","by"],"ans":2,"fb":"\"On the fourth floor\" — floors and levels use \"on\"."},{"q":"I always feel nervous _____ job interviews.","opts":["at","in","on","for"],"ans":0,"fb":"\"At\" for events and occasions: at a meeting, at an interview, at a concert."},{"q":"There was a big storm _____ the night.","opts":["in","on","during","at"],"ans":2,"fb":"\"During the night\" = throughout that period. Most precise here."}]},{"id":"b1_continuous","level":"B1","icon":"🔄","title":"Present and Past Continuous","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EPresent Continuous — three uses\u003C/div\u003E\u003Cdiv class=\"formula\"\u003Eam/is/are + verb-ing\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Enow\u003C/span\u003E\u003Cspan class=\"en\"\u003EShe \u003Cem\u003Eis writing\u003C/em\u003E the report at the moment.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Etemp\u003C/span\u003E\u003Cspan class=\"en\"\u003EI \u003Cem\u003Eam living\u003C/em\u003E in a hotel this month. (not permanent)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Efuture\u003C/span\u003E\u003Cspan class=\"en\"\u003EWe \u003Cem\u003Eare meeting\u003C/em\u003E the client on Friday. (diary entry)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EPast Continuous\u003C/div\u003E\u003Cdiv class=\"formula\"\u003Ewas/were + verb-ing\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EAt 9 AM, I \u003Cem\u003Ewas preparing\u003C/em\u003E the slides.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EShe \u003Cem\u003Ewas reading\u003C/em\u003E when he called. (background action)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"wb\"\u003E\u003Cdiv class=\"wl\"\u003EState verbs — never continuous!\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EI am knowing / She is wanting / He is believing\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EI know / She wants / He believes\u003C/span\u003E\u003C/div\u003Eknow · want · like · love · hate · understand · seem · need · prefer\u003C/div\u003E","quiz":[{"q":"When I arrived, she _____ dinner.","opts":["prepared","was preparing","is preparing","has prepared"],"ans":1,"fb":"Background action in progress → Past Continuous: was + -ing."},{"q":"I _____ what you mean.","opts":["am not understanding","don't understand","was not understanding","is not understanding"],"ans":1,"fb":"\"Understand\" is a state verb → never continuous. Use: \"don't understand\"."},{"q":"He _____ on a new project right now.","opts":["currently works","is currently working","has currently worked","currently worked"],"ans":1,"fb":"Temporary current action → Present Continuous: is currently working."},{"q":"What _____ at 8 PM last night?","opts":["did you do","were you doing","have you done","are you doing"],"ans":1,"fb":"Action in progress at a specific past time → Past Continuous: were you doing."},{"q":"She _____ for London tomorrow morning.","opts":["leaves","will leave","is leaving","left"],"ans":2,"fb":"Fixed future arrangement → Present Continuous: is leaving."},{"q":"They _____ during meetings!","opts":["always interrupt","are always interrupting","always are interrupting","have always interrupted"],"ans":1,"fb":"Present Continuous with \"always\" for an annoying repeated habit."},{"q":"While he _____, he _____ on the phone.","opts":["drove / talked","was driving / was talking","was driving / talked","drove / was talking"],"ans":1,"fb":"Two simultaneous background actions → both Past Continuous."},{"q":"She _____ tired today.","opts":["is seeming","seems","was seeming","seemed"],"ans":1,"fb":"\"Seem\" is a state verb → always Present Simple: \"seems tired\"."}]},{"id":"b1_future","level":"B1","icon":"🔭","title":"Future Forms","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003Ewill — spontaneous decisions and predictions\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI'll answer that. (decided just now)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EIt will probably rain. (prediction, no evidence)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003Egoing to — plans and evidence-based predictions\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EWe're going to launch in Q3. (already planned)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003ELook at those clouds — it's going to rain. (visible evidence)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EPresent Continuous — fixed arrangements\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI'm meeting the client on Thursday. (in the diary)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EFuture Perfect and Continuous\u003C/div\u003E\u003Cdiv class=\"formula\"\u003Ewill have + pp → completed by a future point\u003Cbr\u003Ewill be + -ing → in progress at a future time\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EBy December we \u003Cem\u003Ewill have closed\u003C/em\u003E 12 funds.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EThis time tomorrow I \u003Cem\u003Ewill be flying\u003C/em\u003E to London.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"Someone's at the door. I _____ it.","opts":["am going to get","get","got","'ll get"],"ans":3,"fb":"Spontaneous decision at the moment of speaking → will → I'll get it."},{"q":"The sky is grey — it _____ snow later.","opts":["will","is going to","is about to","snows"],"ans":1,"fb":"Evidence-based prediction → going to. \"Will\" is for predictions without visible evidence."},{"q":"By this time next year, she _____ her PhD.","opts":["will finish","finishes","will have finished","is finishing"],"ans":2,"fb":"\"By this time next year\" = completed by a future point → Future Perfect: will have + past participle."},{"q":"We _____ a new product line next spring. We've signed all the contracts.","opts":["will launch","launch","are going to launch","are launching"],"ans":2,"fb":"Pre-existing plan (contracts signed) → going to."},{"q":"Don't call at 3 PM — I _____ a meeting.","opts":["have","will have had","will be having","am having"],"ans":2,"fb":"Action in progress at a specific future time → Future Continuous: will be + -ing."},{"q":"This time tomorrow, I _____ on the beach.","opts":["lie","will lie","will be lying","am lying"],"ans":2,"fb":"\"This time tomorrow\" = in progress at a future moment → Future Continuous: will be + -ing."},{"q":"_____ you help me with this report later?","opts":["Are","Do","Will","Going to"],"ans":2,"fb":"Request about future willingness → \"will\". Will you help me?"},{"q":"She's already packed — she _____ leave.","opts":["will","is going to","is","goes to"],"ans":1,"fb":"Clear evidence of intention (packed bags) → going to."}]},{"id":"b1_modals","level":"B1","icon":"🎯","title":"Modal Verbs: can / should / must / have to","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EAbility and Permission\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ecan\u003C/em\u003E — ability: I can speak German. / permission: Can I leave?\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ecould\u003C/em\u003E — past ability / polite request: Could you help me?\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EAdvice and Obligation\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Eshould\u003C/em\u003E — advice: You should see a doctor.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Emust\u003C/em\u003E — strong internal obligation: I must call him. (I decide)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ehave to\u003C/em\u003E — external obligation: I have to wear a badge. (rule)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ENo obligation vs. prohibition\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Edon't have to\u003C/em\u003E — optional: You don't have to come. (your choice)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Emustn't\u003C/em\u003E — forbidden: You mustn't park here. (not allowed)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"You _____ a visa to enter — it's required by law.","opts":["should get","must get","might get","could get"],"ans":1,"fb":"\"Must\" for strong obligation. Here it's a legal requirement."},{"q":"_____ you speak a little more slowly, please?","opts":["Must","Should","Could","Have to"],"ans":2,"fb":"\"Could\" is the most polite form for requests."},{"q":"You _____ bring ID — it's optional.","opts":["mustn't","shouldn't","don't have to","can't"],"ans":2,"fb":"\"Don't have to\" = no obligation (optional). \"Mustn't\" would mean forbidden."},{"q":"She _____ attend every meeting — her manager expects it.","opts":["can","has to","should","is able to"],"ans":1,"fb":"\"Has to\" = external obligation imposed by someone else."},{"q":"When I was a child, I _____ stay up past 9 PM.","opts":["couldn't","mustn't","didn't have to","shouldn't"],"ans":0,"fb":"\"Couldn't\" = was not allowed to / not able to (past)."},{"q":"You _____ park here — it's a fire lane.","opts":["don't have to","needn't","mustn't","shouldn't"],"ans":2,"fb":"\"Mustn't\" = strong prohibition (forbidden). \"Don't have to\" would mean just optional."},{"q":"I think you _____ apologise — it wasn't your fault.","opts":["must","have to","shouldn't","should"],"ans":2,"fb":"\"Shouldn't\" = advice against: you have no reason to apologise."},{"q":"He _____ swim really well when he was young.","opts":["should","could","must","has to"],"ans":1,"fb":"\"Could\" = past ability."}]},{"id":"b2_present_perfect","level":"B2","icon":"⏱","title":"Present Perfect","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EThe golden rule\u003C/div\u003EPresent Perfect links the past to the present. Use it when the action has present relevance or the time period is unfinished.\u003Cdiv class=\"formula\"\u003Ehave / has + past participle\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EFour uses\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E1\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EExperience\u003C/em\u003E (ever/never): Have you ever worked abroad?\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E2\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ERecent result\u003C/em\u003E (just/already): She has just submitted the tender.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E3\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EUnfinished period\u003C/em\u003E (this year/so far): We have signed three contracts this week.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E4\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EDuration to now\u003C/em\u003E (since/for): He has worked here for twelve years.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"wb\"\u003E\u003Cdiv class=\"wl\"\u003ENever mix with specific past time\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EI have called him yesterday. / She has arrived last week.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EI called him yesterday. / She arrived last week.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"tb\"\u003E\u003Cdiv class=\"tl\"\u003E🇩🇪 German\u003C/div\u003EGerman Perfekt is used for any past event in speech. English Present Perfect is much stricter — it needs a real link to the present. \"Ich habe ihn gestern gesehen\" → \"I saw him yesterday\" (Past Simple!).\u003C/div\u003E","quiz":[{"q":"He _____ to any of my emails this week.","opts":["didn't reply","hasn't replied","hadn't replied","doesn't reply"],"ans":1,"fb":"\"This week\" = unfinished period → Present Perfect negative: hasn't replied."},{"q":"That's the third time she _____ late this month.","opts":["was","has been","is","had been"],"ans":1,"fb":"\"This month\" = unfinished period + counted repeated event → Present Perfect: has been."},{"q":"I _____ business class before.","opts":["never flew","have never flown","never have flown","had never flown"],"ans":1,"fb":"Life experience with \"never\" → Present Perfect: have + never + past participle."},{"q":"She _____ at the firm since she graduated.","opts":["works","worked","is working","has worked"],"ans":3,"fb":"\"Since\" + state that continues to now → Present Perfect: has worked."},{"q":"How long _____ English?","opts":["did you study","do you study","have you studied","had you studied"],"ans":2,"fb":"\"How long\" + ongoing activity → Present Perfect: have studied."},{"q":"The management team _____ a restructuring.","opts":["just announced","has just announced","just has announced","announced just"],"ans":1,"fb":"Recent announcement with present relevance → has + just + past participle."},{"q":"We _____ the conference room.","opts":["already booked","have already booked","already have booked","had already booked"],"ans":1,"fb":"\"Already\" in Present Perfect: have + already + past participle."},{"q":"Is this your first visit? Yes, I _____ here before.","opts":["never was","never have been","have never been","had never been"],"ans":2,"fb":"Life experience with \"never\" + \"before\" → have + never + past participle."}]},{"id":"b2_conditionals","level":"B2","icon":"🔀","title":"Conditionals: 0, 1, 2, 3","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EFour types\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EZero: If + present → present (facts)\u003Cbr\u003EFirst: If + present → will + inf (real future)\u003Cbr\u003ESecond: If + past simple → would + inf (unreal present)\u003Cbr\u003EThird: If + past perfect → would have + pp (unreal past)\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EKey rules\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E💡\u003C/span\u003E\u003Cspan class=\"en\"\u003ENEVER use \"will\" directly after \"if\" in the condition clause.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E💡\u003C/span\u003E\u003Cspan class=\"en\"\u003ESecond conditional: \"If I \u003Cem\u003Ewere\u003C/em\u003E you...\" — not \"was\" in formal English.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EIf it will rain, we cancel. / If I was you, I'd leave.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EIf it rains, we'll cancel. / If I were you, I'd leave.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"If she _____ now, she'll miss the train.","opts":["doesn't leave","won't leave","didn't leave","hadn't left"],"ans":0,"fb":"First conditional → If + present simple: \"doesn't leave\"."},{"q":"What would you do if you _____ a wallet on the street?","opts":["find","found","will find","have found"],"ans":1,"fb":"Second conditional (hypothetical) → If + past simple: \"found\"."},{"q":"If we _____ earlier, we _____ a larger profit.","opts":["invested / would make","had invested / would have made","invest / will make","had invested / would make"],"ans":1,"fb":"Third conditional (unreal past): If + past perfect → would have + past participle."},{"q":"If you mix red and blue, you _____ purple.","opts":["would get","got","get","will get"],"ans":2,"fb":"Zero conditional (always true fact) → both present simple."},{"q":"She _____ a great leader if she _____ in herself more.","opts":["would be / believed","will be / believes","is / believed","would have been / had believed"],"ans":0,"fb":"Second conditional (unreal present): would + be / if + past simple."},{"q":"If the deal _____ through, what's our backup plan?","opts":["falls","would fall","fell","has fallen"],"ans":0,"fb":"First conditional — real possibility → If + present simple: \"falls\"."},{"q":"He _____ that mistake if he _____ the briefing.","opts":["wouldn't make / read","wouldn't have made / had read","won't make / reads","hadn't made / read"],"ans":1,"fb":"Third conditional: would have + pp / if + past perfect."},{"q":"If I _____ in charge, things would be very different.","opts":["am","was","were","had been"],"ans":2,"fb":"Second conditional: formal subjunctive → \"If I were\" (not \"was\")."}]},{"id":"b2_passive","level":"B2","icon":"🔁","title":"Passive Voice","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EStructure and usage\u003C/div\u003EUse passive when the action or result matters more than who did it.\u003Cdiv class=\"formula\"\u003ESubject + to be (conjugated) + past participle [+ by + agent]\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EAll tenses\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EPres\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Eis/are reviewed\u003C/em\u003E — The data is analysed weekly.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EPast\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ewas/were founded\u003C/em\u003E — The fund was launched in 2015.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EPerf\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ehas/have been signed\u003C/em\u003E — The contract has been signed.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003ECont\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Eis/are being reviewed\u003C/em\u003E — The policy is being reviewed.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EFut\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ewill be announced\u003C/em\u003E — Results will be published Friday.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EMod\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Emust be submitted\u003C/em\u003E — Forms must be filed by Monday.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"wb\"\u003E\u003Cdiv class=\"wl\"\u003EGerman false friend\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EThe email became sent. (\"wurde\" is NOT \"became\")\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EThe email was sent.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"The annual report _____ every January.","opts":["publishes","is published","has published","published"],"ans":1,"fb":"Regular recurring passive → Present Simple Passive: is/are + past participle."},{"q":"All expense claims must _____ by end of month.","opts":["submit","submitted","be submitted","have submitted"],"ans":2,"fb":"Modal passive: modal + be + past participle."},{"q":"The new headquarters _____ by a leading architect.","opts":["currently designed","is currently being designed","currently is designed","has currently designed"],"ans":1,"fb":"Action in progress now → Present Continuous Passive: is/are + being + past participle."},{"q":"Several errors _____ in the original calculations.","opts":["found","were found","have found","are found"],"ans":1,"fb":"Completed past passive → Past Simple Passive: were + past participle."},{"q":"The results _____ at next month's shareholder meeting.","opts":["are announced","were announced","will be announced","announce"],"ans":2,"fb":"Future event → Future Passive: will + be + past participle."},{"q":"All documents _____ before we arrived.","opts":["were already shredded","had already been shredded","have already been shredded","already shredded"],"ans":1,"fb":"Completed before another past event → Past Perfect Passive: had been + past participle."},{"q":"The suspect _____ by police for six hours.","opts":["was questioned","has questioned","questioned","is questioned"],"ans":0,"fb":"Completed past event → Past Simple Passive: was/were + past participle."},{"q":"Which sentence contains a typical German-speaker mistake?","opts":["The file was sent this morning.","The error has been corrected.","The contract became signed last week.","The data will be reviewed."],"ans":2,"fb":"\"Became\" cannot replace \"was\" in passive. \"Wurde\" = \"was\" in English passive, never \"became\"."}]},{"id":"c1_inversion","level":"C1","icon":"🔃","title":"Inversion","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWhat and why\u003C/div\u003EInversion = auxiliary before subject. Used for emphasis after negative adverbials.\u003Cdiv class=\"formula\"\u003ENegative adverb + auxiliary + subject + main verb\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Enormal\u003C/span\u003E\u003Cspan class=\"en\"\u003EI have rarely seen such results.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Einverted\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ERarely have I seen\u003C/em\u003E such results. (formal, emphatic)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ECommon triggers\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003ENever\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ENever have I\u003C/em\u003E witnessed such incompetence.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003ENot only\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ENot only did\u003C/em\u003E she lie, but she also denied it.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EHardly\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EHardly had\u003C/em\u003E we started when problems arose.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003ENo sooner\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ENo sooner had\u003C/em\u003E we signed than it fell apart.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EUnder no circ.\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EUnder no circumstances should\u003C/em\u003E you sign it.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003EOnly after\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EOnly after the audit did\u003C/em\u003E we realise the problem.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003ESo + adj\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ESo alarming was\u003C/em\u003E the data that we stopped.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"Not only _____ the budget, but he also missed the deadline.","opts":["he exceeded","did he exceed","he did exceed","has he exceeded"],"ans":1,"fb":"\"Not only\" → inversion: did + subject + base verb. Second clause uses normal word order."},{"q":"Hardly _____ when the system crashed.","opts":["we had logged in","had we logged in","we logged in","did we log in"],"ans":1,"fb":"\"Hardly\" → Past Perfect inversion: had + subject + past participle."},{"q":"Under no circumstances _____ disclose confidential client data.","opts":["you should","you must","should you","must you not"],"ans":2,"fb":"\"Under no circumstances\" → modal inversion: should + subject."},{"q":"So serious _____ that the meeting was postponed.","opts":["was the situation","the situation was","the situation is","is the situation"],"ans":0,"fb":"\"So + adjective + was + subject + that...\" — formal emphatic inversion."},{"q":"No sooner _____ than the negotiations collapsed.","opts":["we had agreed","had we agreed","did we agree","we agreed"],"ans":1,"fb":"\"No sooner had + subject + pp... than + Past Simple.\" Classic formal pattern."},{"q":"Never before _____ such a turnaround in a single quarter.","opts":["the company achieved","achieved the company","has the company achieved","the company has achieved"],"ans":2,"fb":"\"Never before\" → Present Perfect inversion: have/has + subject + past participle."},{"q":"Rarely _____ an opportunity like this present itself.","opts":["does","do","has","is"],"ans":0,"fb":"\"Rarely\" → inversion with Present Simple: does + subject + base verb."},{"q":"Only when all parties agree _____ sign.","opts":["can we","we can","do we","we do"],"ans":0,"fb":"\"Only when + clause\" → inversion in the main clause: can + subject."}]},{"id":"c1_modals","level":"C1","icon":"🧠","title":"Advanced Modal Verbs","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EPast modals — form\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EModal + have + past participle\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EDeduction about the past\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E100%\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Emust have done\u003C/em\u003E — He must have left early. (strong evidence)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E~50%\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Emight/may/could have done\u003C/em\u003E — She might have missed it.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E0%\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ecan't/couldn't have done\u003C/em\u003E — He can't have signed it — he was away.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ECriticism and regret\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Eshould have done\u003C/em\u003E — regret: I should have checked.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Ecould have done\u003C/em\u003E — missed opportunity: She could have told us.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003Eneedn't have done\u003C/em\u003E — unnecessary but done: I needn't have rushed.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003Eneedn't have vs. didn't need to\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EI needn't have prepared\u003C/em\u003E those slides — I did, but it was unnecessary.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EI didn't need to prepare\u003C/em\u003E slides, so I didn't. (knew in advance)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"The lights are still on — she _____ still be working.","opts":["must","might","can't","should"],"ans":1,"fb":"\"Might\" for ~50% possibility. \"Must\" would be near-certain."},{"q":"I _____ prepared those slides — the meeting was cancelled.","opts":["mustn't have","couldn't have","needn't have","shouldn't"],"ans":2,"fb":"\"Needn't have prepared\" = I prepared them but it turned out to be unnecessary."},{"q":"He _____ have taken the documents — he didn't even have a key.","opts":["must","might","can't","should"],"ans":2,"fb":"\"Can't have taken\" = logical impossibility. No key → impossible."},{"q":"You _____ told me — I completely missed it!","opts":["could have","must have","might have","needn't have"],"ans":0,"fb":"\"Could have told\" = you had the opportunity but didn't use it."},{"q":"She _____ taken a taxi — the traffic was terrible.","opts":["should have","must have","could have","needn't have"],"ans":0,"fb":"\"Should have taken\" = regret/criticism. Taxi would have been the better choice."},{"q":"They _____ be in the office — I can see their coats.","opts":["might","can't","must","should"],"ans":2,"fb":"\"Must\" for near-certain deduction from strong evidence."},{"q":"I _____ submitted the form online — I didn't need to come in person.","opts":["could have","must have","might have","should have"],"ans":0,"fb":"\"Could have submitted\" = option was available but not used."},{"q":"The package _____ have arrived — it was sent three weeks ago.","opts":["should","could","might","can"],"ans":0,"fb":"\"Should have arrived\" = expectation based on normal timelines."}]},{"id":"c1_reported","level":"C1","icon":"💬","title":"Reported Speech","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EBackshift rule\u003C/div\u003E\u003Cdiv class=\"formula\"\u003Epresent → past | past → past perfect | will → would | can → could | must → had to\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EStatements\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\"I am working.\" → She said she \u003Cem\u003Ewas working\u003C/em\u003E.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\"I have submitted it.\" → He said he \u003Cem\u003Ehad submitted\u003C/em\u003E it.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\"I will call you.\" → She said she \u003Cem\u003Ewould call\u003C/em\u003E.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EQuestions — no inversion!\u003C/div\u003E\u003Cdiv class=\"formula\"\u003Easked + if/whether (yes/no) or wh-word + normal word order\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EShe asked if I was available. / He asked where I worked.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EShe asked if was I available. / He asked where did I work.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ECommands and suggestions\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\"Submit it.\" → He told her \u003Cem\u003Eto submit\u003C/em\u003E it.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\"Why not delay it?\" → She suggested \u003Cem\u003Edelaying\u003C/em\u003E it.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"\"We launched the product in April.\" → The CEO said they _____ the product in April.","opts":["launched","have launched","had launched","were launching"],"ans":2,"fb":"Past Simple → Past Perfect in reported speech: launched → had launched."},{"q":"\"Is the report ready?\" → He asked _____ ready.","opts":["if the report was","if was the report","whether was the report","that the report was"],"ans":0,"fb":"Reported yes/no question: if/whether + subject + verb (no inversion). \"Is\" → \"was\"."},{"q":"\"You must attend the briefing.\" → She told us we _____ the briefing.","opts":["must attend","should attend","had to attend","ought to attend"],"ans":2,"fb":"\"Must\" has no past form → becomes \"had to\" in reported speech."},{"q":"\"I have never heard anything like this.\" → He admitted he _____ anything like it.","opts":["never heard","has never heard","had never heard","never has heard"],"ans":2,"fb":"Present Perfect → Past Perfect: has never heard → had never heard."},{"q":"\"Where are the files stored?\" → She asked _____ stored.","opts":["where the files were","where were the files","where the files are","where are the files"],"ans":0,"fb":"Reported wh-question: question word + subject + verb (no inversion)."},{"q":"\"Don't share this with anyone.\" → He warned us _____ with anyone.","opts":["to not share it","not sharing it","not to share it","that not share it"],"ans":2,"fb":"Reported negative command: told/warned + object + not + to + infinitive."},{"q":"\"Let's postpone the launch.\" → She suggested _____ the launch.","opts":["to postpone","postponing","that postpone","postpone"],"ans":1,"fb":"\"Suggest\" always takes gerund (-ing): suggested postponing."},{"q":"\"I can't make Tuesday.\" → He said he _____ Tuesday.","opts":["can't make","couldn't make","wasn't able making","wasn't making"],"ans":1,"fb":"\"Can\" → \"could\" in reported speech."}]},{"id":"c1_subjunctive","level":"C1","icon":"🎭","title":"Subjunctive and Wishes","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWish + past simple — unreal present\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EI wish + past simple (I want something different NOW)\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI wish I \u003Cem\u003Eknew\u003C/em\u003E the answer. (I don't)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI wish it \u003Cem\u003Eweren't\u003C/em\u003E so complex. (formal: weren't, not wasn't)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWish + past perfect — regret\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EI wish + past perfect (I regret something in the past)\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EI wish I \u003Cem\u003Ehad applied\u003C/em\u003E earlier. (I didn't — I regret it)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWish + would — irritation or desired change\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EI wish + subject + would (for others' habits you want changed)\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✓\u003C/span\u003E\u003Cspan class=\"ec\"\u003EI wish he \u003Cem\u003Ewould\u003C/em\u003E reply faster.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E✗\u003C/span\u003E\u003Cspan class=\"ew\"\u003EI wish I would be taller. (don't use \"would\" for yourself)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EOther C1 structures\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EIf only\u003C/em\u003E + past perfect: If only we had acted sooner!\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EIt's time\u003C/em\u003E + past simple: It's time we reconsidered.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EI'd rather\u003C/em\u003E + past simple: I'd rather you didn't mention this.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"I wish I _____ more time to prepare.","opts":["have","had","would have","had had"],"ans":1,"fb":"Wish about unreal present → past simple: \"had\". I don't have enough time now."},{"q":"If only we _____ about the regulation change earlier.","opts":["acted","act","had acted","would act"],"ans":2,"fb":"\"If only\" + regret about the past → past perfect: had acted."},{"q":"I wish my colleague _____ interrupting me.","opts":["would stop","stopped","has stopped","stop"],"ans":0,"fb":"\"Wish + would\" for an annoying habit of someone else you want changed."},{"q":"It's time the board _____ this issue seriously.","opts":["take","will take","took","has taken"],"ans":2,"fb":"\"It's time + subject + past simple\" = they should do this now."},{"q":"I'd rather you _____ about this to the client.","opts":["don't talk","won't talk","hadn't talked","didn't talk"],"ans":3,"fb":"\"I'd rather + subject + past simple\" for present/future preference."},{"q":"She wishes she _____ that job offer last year.","opts":["chose","chooses","had chosen","would choose"],"ans":2,"fb":"Regret about the past → wish + past perfect: had chosen."},{"q":"He acts as if he _____ everything.","opts":["knows","owned","were","knew"],"ans":3,"fb":"\"As if\" + past simple = unreal comparison to the present."},{"q":"I'd sooner _____ that negotiation differently.","opts":["handle","to handle","have handled","handling"],"ans":2,"fb":"\"I'd sooner have + past participle\" = past preference/regret."}]},{"id":"c2_cleft","level":"C2","icon":"✂️","title":"Cleft Sentences","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWhat and why\u003C/div\u003ECleft sentences split a sentence to emphasise one element.\u003Cdiv class=\"formula\"\u003EIt is/was + [emphasis] + that/who + rest of clause\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Enormal\u003C/span\u003E\u003Cspan class=\"en\"\u003EThe CEO signed the merger in Berlin.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Eit-cleft\u003C/span\u003E\u003Cspan class=\"en\"\u003EIt was \u003Cem\u003Ethe CEO\u003C/em\u003E who signed it. (emphasises WHO)\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Eit-cleft\u003C/span\u003E\u003Cspan class=\"en\"\u003EIt was \u003Cem\u003Ein Berlin\u003C/em\u003E that it was signed. (emphasises WHERE)\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWhat-clefts and All-clefts\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EWhat + clause + is/was + [emphasis]\u003Cbr\u003EAll + subject + verb + is/was + [emphasis]\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EWhat we need\u003C/em\u003E is more transparency.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EAll I ask\u003C/em\u003E is a fair hearing.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"It was the Finance Director _____ approved the budget.","opts":["that","which","whose","what"],"ans":0,"fb":"\"It was + person + that/who\" — both \"that\" and \"who\" are correct for people."},{"q":"What the team _____ is clearer guidelines.","opts":["need","needs","needed","have needed"],"ans":1,"fb":"\"What + clause\" is singular → \"needs\" (third person singular)."},{"q":"It was _____ that the breakthrough was made.","opts":["in 2023","in 2023 when","in 2023 which","in 2023 where"],"ans":0,"fb":"\"It was + time expression + that...\" — always \"that\" in cleft sentences."},{"q":"_____ surprised everyone was the speed of the recovery.","opts":["That","Which","What","It"],"ans":2,"fb":"\"What surprised everyone was...\" — \"what\" introduces the cleft clause as subject."},{"q":"All _____ is your honest feedback.","opts":["that I need","I need","what I need","I am needing"],"ans":1,"fb":"\"All I need is...\" — after \"all\", use subject + verb directly."},{"q":"It was not until the third quarter _____ profits recovered.","opts":["when","which","where","that"],"ans":3,"fb":"\"It was not until... that...\" — always \"that\" in this cleft structure."},{"q":"It was the regulatory change, not the recession, _____ caused the collapse.","opts":["which","what","that","who"],"ans":2,"fb":"Even with an appositive phrase, still use \"that\" in cleft sentences."},{"q":"What I find _____ is the lack of transparency.","opts":["most concerns","most concerning","most concerned","the most concern"],"ans":1,"fb":"\"What I find most concerning is...\" — adjective after \"find + most\"."}]},{"id":"c2_mixed_cond","level":"C2","icon":"🔮","title":"Mixed Conditionals","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EWhy they exist\u003C/div\u003EWhen condition and result are in different time frames.\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EType 1: Past condition → Present result\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EIf + past perfect → would + base verb (NOW)\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EIf I \u003Cem\u003Ehad taken\u003C/em\u003E that job, I \u003Cem\u003Ewould be\u003C/em\u003E in London now.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003Ekey\u003C/span\u003E\u003Cspan class=\"en\"\u003E\"would be\" (present state) NOT \"would have been\"\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EType 2: Present state → Past result\u003C/div\u003E\u003Cdiv class=\"formula\"\u003EIf + past simple/were → would have + pp\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003EIf I \u003Cem\u003Ewere\u003C/em\u003E more patient, I \u003Cem\u003Ewould have handled\u003C/em\u003E it better.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"If she _____ the offer, she _____ our Head of Tax now.","opts":["accepted / would be","had accepted / would be","had accepted / would have been","accepted / would have been"],"ans":1,"fb":"Past condition → present result: If + past perfect → would + base verb (present state)."},{"q":"If he _____ more careful, he _____ that mistake last year.","opts":["was / would make","were / would have made","had been / would make","were / would make"],"ans":1,"fb":"Present characteristic → past result: If + were → would have + past participle."},{"q":"She _____ fluent in Japanese now if she _____ her lessons.","opts":["would be / had continued","would have been / continued","would be / continued","would have been / had continued"],"ans":0,"fb":"Past action → present result: would + be / if + past perfect."},{"q":"If I _____ a morning person, I _____ the 6 AM flight instead.","opts":["were / would take","was / would have taken","were / would have taken","had been / would take"],"ans":2,"fb":"Present state → past result: If + were → would have + past participle."},{"q":"They _____ bankrupt now if the government _____ intervened.","opts":["would be / hadn't","would have been / didn't","would be / didn't","had been / hadn't"],"ans":0,"fb":"Past intervention → present state: would + be / if + past perfect."},{"q":"If I _____ my instincts more, I _____ in that stock when I had the chance.","opts":["trusted / would have invested","had trusted / would invest","trusted / would invest","had trusted / would have invested"],"ans":0,"fb":"Present characteristic → past result: If + past simple → would have + past participle."},{"q":"He _____ in such debt now if he _____ more wisely.","opts":["wouldn't be / had spent","wouldn't have been / spent","wouldn't be / spent","hadn't been / had spent"],"ans":0,"fb":"Past behaviour → present state: would + be (now) / if + past perfect."},{"q":"If she _____ a native speaker, the negotiation _____ more smoothly.","opts":["were / would have gone","was / would go","had been / would go","were / would go"],"ans":0,"fb":"Present state → past result: If + were → would have + past participle."}]},{"id":"c2_discourse","level":"C2","icon":"📝","title":"Discourse Markers","explain":"\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EContrast and Concession\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003ENevertheless / nonetheless\u003C/em\u003E — despite this, we proceed.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EWhereas / while\u003C/em\u003E — direct contrast between two things.\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EAlbeit\u003C/em\u003E — even though (before adjective/phrase, formal).\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EGranted / admittedly\u003C/em\u003E — conceding a point before arguing against it.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003EAddition and Emphasis\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EFurthermore / moreover\u003C/em\u003E — in addition (stronger than \"also\").\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EIndeed / in fact\u003C/em\u003E — emphasis or confirmation.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E\u003Cdiv class=\"eb\"\u003E\u003Cdiv class=\"bl\"\u003ECause and Result\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EHence / thus / consequently\u003C/em\u003E — formal \"therefore\".\u003C/span\u003E\u003C/div\u003E\u003Cdiv class=\"ex\"\u003E\u003Cspan class=\"et\"\u003E→\u003C/span\u003E\u003Cspan class=\"en\"\u003E\u003Cem\u003EThereby + -ing\u003C/em\u003E — costs were cut, thereby reducing the deficit.\u003C/span\u003E\u003C/div\u003E\u003C/div\u003E","quiz":[{"q":"The economy contracted shar
